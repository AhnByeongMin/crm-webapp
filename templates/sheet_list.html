<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스프레드시트 - CRM</title>
    {% include 'includes/header.html' %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }

        .container { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h1 { font-size: 22px; color: #333; font-weight: 700; }

        .btn-create {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-create:hover { opacity: 0.88; }

        .sheet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .sheet-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s;
            border: 1px solid #eee;
            position: relative;
        }
        .sheet-card:hover { box-shadow: 0 6px 20px rgba(102,126,234,0.18); transform: translateY(-2px); }

        .sheet-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }
        .sheet-title {
            font-size: 15px; font-weight: 600; color: #222;
            margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sheet-meta {
            font-size: 12px; color: #999;
            display: flex; flex-direction: column; gap: 2px;
        }
        .badge-shared {
            display: inline-block;
            padding: 2px 8px;
            background: #e8f0fe; color: #667eea;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            margin-top: 6px;
        }
        .badge-mine {
            display: inline-block;
            padding: 2px 8px;
            background: #f0fdf4; color: #22c55e;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            margin-top: 6px;
        }

        .card-actions {
            position: absolute; top: 14px; right: 14px;
            display: flex; gap: 6px;
            opacity: 0; transition: opacity 0.15s;
        }
        .sheet-card:hover .card-actions { opacity: 1; }
        .card-actions button {
            width: 28px; height: 28px;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 13px; display: flex; align-items: center; justify-content: center;
        }
        .btn-delete-card { background: #fee2e2; color: #dc2626; }
        .btn-delete-card:hover { background: #dc2626; color: white; }

        .empty-state {
            text-align: center; padding: 80px 20px;
            color: #aaa;
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; }

        /* 생성 모달 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 16px;
            padding: 28px; width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-box h2 { font-size: 18px; margin-bottom: 20px; color: #222; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
        .form-group input[type="text"] {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .form-group input[type="text"]:focus { border-color: #667eea; }
        .form-group label.checkbox-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 0;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel {
            flex: 1; padding: 10px;
            background: #f5f5f5; color: #555;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
        }
        .btn-confirm {
            flex: 1; padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
        }

        /* 다크모드 */
        [data-theme="dark"] body { background: #12121e; }
        [data-theme="dark"] .page-header h1 { color: #e8e8e8; }
        [data-theme="dark"] .sheet-card {
            background: linear-gradient(145deg, #1e1e38 0%, #252550 100%);
            border-color: rgba(96,165,250,0.15);
        }
        [data-theme="dark"] .sheet-title { color: #e8e8e8; }
        [data-theme="dark"] .sheet-meta { color: #888; }
        [data-theme="dark"] .modal-box {
            background: linear-gradient(145deg, #1e1e38 0%, #252550 100%);
            border: 1px solid rgba(96,165,250,0.2);
        }
        [data-theme="dark"] .modal-box h2 { color: #e8e8e8; }
        [data-theme="dark"] .form-group label { color: #b0b0b0; }
        [data-theme="dark"] .form-group input[type="text"] {
            background: rgba(30,30,56,0.8); border-color: rgba(96,165,250,0.3);
            color: #e8e8e8;
        }
        [data-theme="dark"] .btn-cancel { background: rgba(255,255,255,0.08); color: #b0b0b0; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>스프레드시트</h1>
        <button class="btn-create" onclick="openCreateModal()">
            <span>+</span> 새 스프레드시트
        </button>
    </div>

    <div class="sheet-grid" id="sheetGrid">
        <!-- JS로 렌더링 -->
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="icon">📊</div>
        <p>아직 스프레드시트가 없습니다.<br>새 스프레드시트를 만들어보세요.</p>
    </div>
</div>

<!-- 생성 모달 -->
<div class="modal-overlay" id="createModal">
    <div class="modal-box">
        <h2>새 스프레드시트</h2>
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="newTitle" placeholder="스프레드시트 제목" maxlength="100">
        </div>
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" id="newIsShared">
                팀 전체 공유
            </label>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeCreateModal()">취소</button>
            <button class="btn-confirm" onclick="createSheet()">만들기</button>
        </div>
    </div>
</div>

<script>
    let sheets = [];

    async function loadSheets() {
        const res = await fetch('/api/sheets');
        sheets = await res.json();
        renderSheets();
    }

    function renderSheets() {
        const grid = document.getElementById('sheetGrid');
        const empty = document.getElementById('emptyState');
        if (!sheets.length) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        grid.innerHTML = sheets.map(s => `
            <div class="sheet-card" onclick="openSheet(${s.id})">
                <div class="sheet-icon">📊</div>
                <div class="sheet-title">${escHtml(s.title)}</div>
                <div class="sheet-meta">
                    <span>소유자: ${escHtml(s.owner)}</span>
                    <span>${formatDate(s.updated_at)} 수정</span>
                </div>
                ${s.is_shared ? '<span class="badge-shared">공유</span>' : '<span class="badge-mine">개인</span>'}
                <div class="card-actions">
                    <button class="btn-delete-card" onclick="deleteSheet(event, ${s.id})">🗑</button>
                </div>
            </div>
        `).join('');
    }

    function openSheet(id) {
        window.location.href = `/sheets/${id}`;
    }

    function openCreateModal() {
        document.getElementById('newTitle').value = '';
        document.getElementById('newIsShared').checked = false;
        document.getElementById('createModal').classList.add('show');
        setTimeout(() => document.getElementById('newTitle').focus(), 100);
    }
    function closeCreateModal() {
        document.getElementById('createModal').classList.remove('show');
    }

    async function createSheet() {
        const title = document.getElementById('newTitle').value.trim() || '새 스프레드시트';
        const is_shared = document.getElementById('newIsShared').checked;
        const res = await fetch('/api/sheets', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title, is_shared})
        });
        const data = await res.json();
        closeCreateModal();
        window.location.href = `/sheets/${data.id}`;
    }

    async function deleteSheet(e, id) {
        e.stopPropagation();
        if (!confirm('이 스프레드시트를 삭제하시겠습니까?')) return;
        const res = await fetch(`/api/sheets/${id}`, {method: 'DELETE'});
        if (res.ok) {
            sheets = sheets.filter(s => s.id !== id);
            renderSheets();
        } else {
            alert('삭제 권한이 없습니다.');
        }
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - d) / 60000);
        if (diff < 1) return '방금 전';
        if (diff < 60) return `${diff}분 전`;
        if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
        return `${d.getMonth()+1}/${d.getDate()}`;
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('createModal').addEventListener('click', function(e) {
        if (e.target === this) closeCreateModal();
    });
    document.getElementById('newTitle').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') createSheet();
    });

    loadSheets();
</script>
</body>
</html>
