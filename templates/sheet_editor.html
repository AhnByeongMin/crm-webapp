<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ sheet_title }} - 스프레드시트</title>

    {% include 'includes/header.html' %}
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <!-- 한국어 웹폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">

    <!-- Luckysheet CSS -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css'/>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css'/>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css'/>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css'/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f0f0; display: flex; flex-direction: column; }

        /* 공통 헤더가 차지하는 높이를 제외한 나머지를 채움 */
        #editorRoot { flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative; }

        /* ── 상단 툴바 ── */
        #topbar {
            height: 52px; background: #fff; border-bottom: 1px solid #e0e0e0;
            display: flex; align-items: center; padding: 0 14px; gap: 12px;
            z-index: 200; position: relative; flex-shrink: 0;
        }
        #btnBack {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px; background: #f5f5f5; border: none; border-radius: 8px;
            font-size: 13px; color: #555; cursor: pointer; white-space: nowrap;
        }
        #btnBack:hover { background: #eee; }
        #titleInput {
            flex: 1; max-width: 360px; padding: 7px 12px;
            border: 1px solid transparent; border-radius: 8px;
            font-size: 15px; font-weight: 600; color: #222; background: transparent; outline: none;
        }
        #titleInput:hover { border-color: #ddd; background: #f9f9f9; }
        #titleInput:focus { border-color: #667eea; background: #fff; }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .save-status { font-size: 12px; color: #aaa; }
        .save-status.saving { color: #667eea; }
        .save-status.saved  { color: #22c55e; }
        #btnSave {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        #btnSave:hover { opacity: 0.88; }
        #btnSave:disabled { opacity: 0.5; cursor: default; }

        /* ── 접속자 아바타 ── */
        #userAvatars { display: flex; align-items: center; gap: -4px; }
        .avatar {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: #fff;
            border: 2px solid #fff; margin-left: -6px;
            cursor: default; position: relative;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            transition: transform 0.15s;
        }
        .avatar:first-child { margin-left: 0; }
        .avatar:hover { transform: translateY(-2px) scale(1.1); z-index: 10; }
        .avatar .tooltip {
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #fff; font-size: 11px;
            padding: 3px 8px; border-radius: 4px; white-space: nowrap;
            pointer-events: none; opacity: 0; transition: opacity 0.15s;
        }
        .avatar:hover .tooltip { opacity: 1; }

        /* ── Luckysheet 영역 ── */
        #sheetWrap { flex: 1; min-height: 0; position: relative; overflow: visible; }

        /* 툴팁이 잘리지 않도록 툴바 영역 overflow 허용 */
        #luckysheet-toolbar-container { overflow: visible !important; }
        #luckysheet { overflow: visible !important; }

        /* Luckysheet 실제 툴팁: #luckysheet-tooltip-up (.jfk-tooltip) */
        #luckysheet-tooltip-up,
        .jfk-tooltip {
            background: rgba(28, 28, 48, 0.96) !important;
            color: #f0f0f0 !important;
            border: 1px solid rgba(120,120,180,0.3) !important;
            box-shadow: 0 3px 12px rgba(0,0,0,0.5) !important;
            border-radius: 6px !important;
            font-size: 12px !important;
            z-index: 9999 !important;
        }
        .jfk-tooltip-contentId {
            color: #f0f0f0 !important;
        }
        /* 화살표 색도 통일 */
        .jfk-tooltip-arrow .jfk-tooltip-arrowimplbefore,
        .jfk-tooltip-arrow .jfk-tooltip-arrowimplafter {
            border-top-color: rgba(28, 28, 48, 0.96) !important;
            border-bottom-color: rgba(28, 28, 48, 0.96) !important;
        }
        #luckysheet { width: 100%; height: 100%; }

        /* ── 커서 오버레이 ── */
        #cursorOverlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 50; overflow: hidden;
        }
        .remote-cursor {
            position: absolute; pointer-events: none;
            border: 2px solid;
            transition: top 0.12s, left 0.12s, width 0.12s, height 0.12s;
        }
        .remote-cursor-label {
            position: absolute; top: -20px; left: -1px;
            font-size: 11px; font-weight: 600; color: #fff;
            padding: 1px 6px; border-radius: 3px 3px 3px 0;
            white-space: nowrap; line-height: 18px;
        }

        /* ── 로딩 ── */
        #loadingOverlay {
            position: absolute; inset: 0; background: #f5f5f5;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e0e0e0;
            border-top-color: #667eea; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingOverlay p { color: #888; font-size: 14px; }

        /* ── 다크모드 툴바 ── */
        [data-theme="dark"] #topbar { background: #1e1e38; border-bottom-color: rgba(96,165,250,0.2); }
        [data-theme="dark"] #btnBack { background: rgba(255,255,255,0.08); color: #ccc; }
        [data-theme="dark"] #titleInput { color: #e8e8e8; }
        [data-theme="dark"] #titleInput:hover { background: rgba(255,255,255,0.05); border-color: rgba(96,165,250,0.3); }
        [data-theme="dark"] #titleInput:focus { background: rgba(255,255,255,0.08); border-color: #667eea; }
        [data-theme="dark"] #loadingOverlay { background: #1a1a2e; }

        /* ── 다크모드: Luckysheet 내부 오버라이드 ── */
        /* 전체 배경 */
        [data-theme="dark"] #luckysheet { background: #1a1a2e; }
        [data-theme="dark"] #luckysheet-grid-window-1,
        [data-theme="dark"] .luckysheet-grid-container { background: #1a1a2e !important; }

        /* 상단 리본 툴바 */
        [data-theme="dark"] #luckysheet-toolbar-container,
        [data-theme="dark"] .luckysheet-toolbar { background: #252545 !important; border-bottom-color: rgba(96,165,250,0.15) !important; }
        [data-theme="dark"] .luckysheet-toolbar-button,
        [data-theme="dark"] .luckysheet-toolbar-combo { color: #ccc !important; }
        [data-theme="dark"] .luckysheet-toolbar-button:hover { background: rgba(255,255,255,0.08) !important; }
        [data-theme="dark"] .luckysheet-toolbar-menu-button-arrow { border-top-color: #aaa !important; }

        /* 수식 입력창 */
        [data-theme="dark"] #luckysheet-formula-bar-container,
        [data-theme="dark"] .luckysheet-formula-bar { background: #1e1e38 !important; border-bottom-color: rgba(96,165,250,0.15) !important; }
        [data-theme="dark"] #luckysheet-formula-bar-input,
        [data-theme="dark"] .luckysheet-formula-bar-input { background: #252545 !important; color: #e8e8e8 !important; border-color: rgba(96,165,250,0.2) !important; }
        [data-theme="dark"] #luckysheet-input-box { background: #252545 !important; color: #e8e8e8 !important; }

        /* 셀 이름상자 (A1 표시) */
        [data-theme="dark"] #luckysheet-cell-input-box-index,
        [data-theme="dark"] .luckysheet-input-box-index { background: #252545 !important; color: #ccc !important; border-color: rgba(96,165,250,0.2) !important; }

        /* 행/열 헤더 */
        [data-theme="dark"] .luckysheet-cols-h-cells canvas,
        [data-theme="dark"] .luckysheet-rows-h canvas { filter: invert(0.85) hue-rotate(180deg) brightness(0.85); }

        /* 셀 그리드 캔버스 - 약간 어두운 배경 */
        [data-theme="dark"] #luckysheetTableContent,
        [data-theme="dark"] .luckysheet-cell-main canvas { filter: brightness(0.92) contrast(0.95); }

        /* 하단 시트탭 바 */
        [data-theme="dark"] #luckysheet-sheet-area,
        [data-theme="dark"] .luckysheet-sheet-area { background: #1e1e38 !important; border-top-color: rgba(96,165,250,0.15) !important; }
        [data-theme="dark"] .luckysheet-sheets-item { background: #252545 !important; color: #bbb !important; border-color: rgba(96,165,250,0.15) !important; }
        [data-theme="dark"] .luckysheet-sheets-item.luckysheet-sheets-item-active { background: #667eea !important; color: #fff !important; }
        [data-theme="dark"] .luckysheet-sheets-item:hover { background: rgba(102,126,234,0.2) !important; }
        [data-theme="dark"] .fa-plus-square-o,
        [data-theme="dark"] .luckysheet-sheets-add { color: #999 !important; }

        /* 우측 스크롤 영역 배경 */
        [data-theme="dark"] #luckysheet-scrollbar-x,
        [data-theme="dark"] #luckysheet-scrollbar-y { background: #1e1e38 !important; }

        /* 드롭다운/컨텍스트 메뉴 */
        [data-theme="dark"] .luckysheet-cols-menu,
        [data-theme="dark"] .luckysheet-rightclick-menu,
        [data-theme="dark"] .luckysheet-filter-menu { background: #252545 !important; border-color: rgba(96,165,250,0.2) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; }
        [data-theme="dark"] .luckysheet-cols-menu li,
        [data-theme="dark"] .luckysheet-rightclick-menu li,
        [data-theme="dark"] .luckysheet-filter-menu li { color: #ccc !important; }
        [data-theme="dark"] .luckysheet-cols-menu li:hover,
        [data-theme="dark"] .luckysheet-rightclick-menu li:hover { background: rgba(102,126,234,0.25) !important; }

        /* 셀 인라인 편집기 */
        [data-theme="dark"] #luckysheet-rich-text-editor { color: #e8e8e8 !important; caret-color: #e8e8e8; }

        /* ── 다크모드: 모달/다이얼로그 ── */
        [data-theme="dark"] .luckysheet-modal-dialog,
        [data-theme="dark"] .luckysheet-modal-dialog-content,
        [data-theme="dark"] .luckysheetconditionformat_dialog,
        [data-theme="dark"] .luckysheet-formula-search-c,
        [data-theme="dark"] .luckysheet-formula-functionrange-c {
            background: #1e1e38 !important;
            border-color: rgba(96,165,250,0.2) !important;
            color: #e0e0e0 !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
        }
        /* 모달 제목바 */
        [data-theme="dark"] .luckysheet-modal-dialog-title,
        [data-theme="dark"] .luckysheet-modal-dialog-header {
            background: #252545 !important;
            border-bottom-color: rgba(96,165,250,0.2) !important;
            color: #e0e0e0 !important;
        }
        /* 닫기 버튼 */
        [data-theme="dark"] .luckysheet-modal-dialog-title-close,
        [data-theme="dark"] .luckysheet-modal-dialog-close {
            color: #aaa !important;
        }
        /* 레이블 텍스트 */
        [data-theme="dark"] .luckysheet-modal-dialog label,
        [data-theme="dark"] .luckysheet-modal-dialog span,
        [data-theme="dark"] .luckysheet-modal-dialog p,
        [data-theme="dark"] .luckysheet-formula-search-c label,
        [data-theme="dark"] .luckysheet-formula-search-c span {
            color: #bbb !important;
        }
        /* 입력창 */
        [data-theme="dark"] .luckysheet-modal-dialog input[type="text"],
        [data-theme="dark"] .luckysheet-modal-dialog input[type="number"],
        [data-theme="dark"] .luckysheet-modal-dialog textarea,
        [data-theme="dark"] .luckysheet-formula-search-c input {
            background: #252545 !important;
            border-color: rgba(96,165,250,0.25) !important;
            color: #e8e8e8 !important;
        }
        [data-theme="dark"] .luckysheet-modal-dialog input:focus,
        [data-theme="dark"] .luckysheet-formula-search-c input:focus {
            border-color: #667eea !important;
            outline: none;
        }
        /* 셀렉트박스 */
        [data-theme="dark"] .luckysheet-modal-dialog select,
        [data-theme="dark"] .luckysheet-formula-search-c select {
            background: #252545 !important;
            border-color: rgba(96,165,250,0.25) !important;
            color: #e8e8e8 !important;
        }
        /* 함수 목록 리스트 */
        [data-theme="dark"] .luckysheet-formula-search-func-list,
        [data-theme="dark"] .luckysheet-formula-functionrange-func {
            background: #1a1a2e !important;
            border-color: rgba(96,165,250,0.15) !important;
        }
        [data-theme="dark"] .luckysheet-formula-search-func-list li,
        [data-theme="dark"] .luckysheet-formula-functionrange-func li {
            color: #ccc !important;
            border-bottom-color: rgba(255,255,255,0.05) !important;
        }
        [data-theme="dark"] .luckysheet-formula-search-func-list li:hover,
        [data-theme="dark"] .luckysheet-formula-functionrange-func li:hover {
            background: rgba(102,126,234,0.2) !important;
        }
        [data-theme="dark"] .luckysheet-formula-search-func-list li.luckysheet-formula-search-func-list-active,
        [data-theme="dark"] .luckysheet-formula-functionrange-func li.on {
            background: rgba(102,126,234,0.45) !important;
            color: #fff !important;
        }
        /* 함수 설명 영역 */
        [data-theme="dark"] .luckysheet-formula-search-func-detail,
        [data-theme="dark"] .luckysheet-formula-functionrange-func-detail {
            background: #252545 !important;
            border-top-color: rgba(96,165,250,0.15) !important;
            color: #bbb !important;
        }
        /* 모달 하단 버튼 영역 */
        [data-theme="dark"] .luckysheet-modal-dialog-footer,
        [data-theme="dark"] .luckysheet-modal-dialog .btn-group {
            background: #252545 !important;
            border-top-color: rgba(96,165,250,0.15) !important;
        }
        /* 취소 버튼 */
        [data-theme="dark"] .luckysheet-modal-dialog .btn-default,
        [data-theme="dark"] .luckysheet-modal-dialog .luckysheet-model-close-btn {
            background: rgba(255,255,255,0.08) !important;
            border-color: rgba(255,255,255,0.15) !important;
            color: #ccc !important;
        }

        [data-theme="dark"] .luckysheet-modal-dialog .btn-primary,

<body>
<div id="editorRoot">

<!-- 상단 툴바 -->
<div id="topbar">
    <button id="btnBack" onclick="goBack()">← 목록</button>
    <input type="text" id="titleInput" value="{{ sheet_title }}" maxlength="100" onblur="onTitleChange()">
    <div class="topbar-right">
        <div id="userAvatars"></div>
        <span class="save-status" id="saveStatus"></span>
        <button id="btnSave" onclick="saveSheet()">저장</button>
    </div>
</div>

<!-- Luckysheet + 커서 오버레이 -->
<div id="sheetWrap">
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>스프레드시트 불러오는 중...</p>
    </div>
    <div id="luckysheet"></div>
    <div id="cursorOverlay"></div>
</div>

</div><!-- /#editorRoot -->

<!-- Luckysheet JS -->
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>

<script>
const SHEET_ID   = {{ sheet_id }};
const MY_NAME    = '{{ username }}';
const MY_COLOR   = (() => {
    const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];
    let h = 0; for (const c of MY_NAME) h += c.charCodeAt(0);
    return COLORS[h % COLORS.length];
})();

let saveTimer   = null;
let initialized = false;
let socket      = null;
// 원격 커서 상태 {username: {color, row, col, row2, col2}}
let remoteCursors = {};
// 내가 마지막으로 emit한 커서 위치 (중복 방지)
let lastEmitCursor = null;
// 내가 마지막으로 emit한 셀 변경 타임스탬프 (루프 방지)
let remoteUpdateTs = 0;

// ── 시트 초기화 ──────────────────────────────
async function initSheet() {
    const res = await fetch(`/api/sheets/${SHEET_ID}`);
    if (!res.ok) { location.href = '/sheets'; return; }
    const sheet = await res.json();

    let data = sheet.data;
    if (!data || !data.length) {
        data = [{ name: 'Sheet1', index: 'sheet_0', status: 1, order: 0, celldata: [], config: {} }];
    }

    luckysheet.create({
        container: 'luckysheet',
        title: sheet.title,
        lang: 'en',
        data: data,
        showtoolbar: true,
        showinfobar: false,
        showstatisticBar: true,
        sheetBottomConfig: true,
        allowEdit: true,
        enableAddRow: true,
        enableAddBackTop: false,
        userInfo: false,
        showsheetbar: true,
        devicePixelRatio: window.devicePixelRatio,
        forceCalculation: true,
        hook: {
            workbookCreateAfter() {
                initialized = true;
                document.getElementById('loadingOverlay').style.display = 'none';
                injectKoreanFonts();
                applyKoreanLabels();
                initSocket();
            },
            // 셀 편집 완료 → 즉시 동기화 + 자동저장 예약
            cellUpdateBefore(r, c, value) {
                if (!initialized) return;
                const sheetIndex = getCurrentSheetIndex();
                const ts = Date.now();
                // 원격에서 온 업데이트라면 다시 emit하지 않음
                if (ts - remoteUpdateTs < 200) return;
                socketEmit('sheet_cell_update', {
                    sheet_id: SHEET_ID,
                    sheet_index: sheetIndex,
                    row: r, col: c,
                    value: value,
                    ts: ts
                });
                scheduleSave();
            },
            // 범위 선택 → 커서 위치 emit
            rangeSelect(sheetIndex, range) {
                if (!initialized || !range || !range.length) return;
                const r = range[0];
                const pos = { row: r.row[0], col: r.column[0], row2: r.row[1], col2: r.column[1] };
                // 중복 emit 방지
                const key = `${pos.row},${pos.col},${pos.row2},${pos.col2}`;
                if (key === lastEmitCursor) return;
                lastEmitCursor = key;
                socketEmit('sheet_cursor_move', {
                    sheet_id: SHEET_ID,
                    sheet_index: getCurrentSheetIndex(),
                    ...pos,
                    color: MY_COLOR
                });
            },
            updated() {
                if (!initialized) return;
                scheduleSave();
            }
        }
    });
}

function getCurrentSheetIndex() {
    try {
        const sheets = luckysheet.getAllSheets();
        const cur = sheets.find(s => s.status === 1);
        return cur ? cur.index : 0;
    } catch { return 0; }
}

// ── 저장 ─────────────────────────────────────
function scheduleSave() {
    setSaveStatus('saving', '변경됨');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => saveSheet(true), 4000);
}

async function saveSheet(isAuto = false) {
    if (!initialized) return;
    clearTimeout(saveTimer);
    setSaveStatus('saving', '저장 중...');
    document.getElementById('btnSave').disabled = true;
    try {
        const title = document.getElementById('titleInput').value.trim() || '새 스프레드시트';
        const data  = luckysheet.getAllSheets();
        const res   = await fetch(`/api/sheets/${SHEET_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, data })
        });
        if (res.ok) {
            setSaveStatus('saved', isAuto ? '자동 저장됨' : '저장 완료');
            document.title = `${title} - 스프레드시트`;
            setTimeout(() => setSaveStatus('', ''), 3000);
        } else { setSaveStatus('', '저장 실패'); }
    } catch { setSaveStatus('', '저장 실패'); }

}

function setSaveStatus(cls, msg) {
    const el = document.getElementById('saveStatus');
    el.className = 'save-status ' + cls;
    el.textContent = msg;
}

function onTitleChange() {
    const title = document.getElementById('titleInput').value.trim() || '새 스프레드시트';
    document.getElementById('titleInput').value = title;
    if (initialized) {
        fetch(`/api/sheets/${SHEET_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title })
        });
    }
}

function goBack() {
    if (socket) socket.emit('sheet_leave', { sheet_id: SHEET_ID });
    if (initialized) saveSheet(false).then(() => { location.href = '/sheets'; });
    else location.href = '/sheets';
}

document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveSheet(); }
});
window.addEventListener('beforeunload', () => {
    if (socket) socket.emit('sheet_leave', { sheet_id: SHEET_ID });
    if (saveTimer) saveSheet(true);
});

// ── Socket.IO 실시간 협업 ─────────────────────
function socketEmit(event, data) {
    if (socket && socket.connected) socket.emit(event, data);
}

function initSocket() {
    socket = io({ transports: ['websocket', 'polling'] });

    socket.on('connect', () => {
        socket.emit('sheet_join', { sheet_id: SHEET_ID, color: MY_COLOR });
    });

    socket.on('disconnect', () => {
        // 재연결 시 자동으로 connect 이벤트 재발생
    });

    // 현재 접속자 목록 수신 (내가 입장할 때)
    socket.on('sheet_users_list', ({ users }) => {
        users.forEach(u => {
            if (u.username !== MY_NAME) remoteCursors[u.username] = { color: u.color };
        });
        renderAvatars(users);
    });

    // 다른 사람 입장
    socket.on('sheet_user_joined', ({ username, color }) => {
        if (!remoteCursors[username]) remoteCursors[username] = {};
        remoteCursors[username].color = color;
        addAvatar(username, color);
    });

    // 다른 사람 퇴장
    socket.on('sheet_user_left', ({ username }) => {
        delete remoteCursors[username];
        removeCursorEl(username);
        removeAvatar(username);
    });

    // 원격 셀 변경 수신 → 즉시 적용
    socket.on('sheet_cell_updated', ({ username, sheet_index, row, col, value, ts }) => {
        if (!initialized) return;
        remoteUpdateTs = Date.now();
        try {
            // 현재 시트와 같은 시트일 때만 즉시 반영
            const curIndex = getCurrentSheetIndex();
            if (String(sheet_index) === String(curIndex)) {
                luckysheet.setCellValue(row, col, value);
            }
        } catch(e) { /* 다른 시트면 무시, 저장 시 반영됨 */ }
    });

    // 원격 커서 이동 수신
    socket.on('sheet_cursor_moved', ({ username, color, row, col, row2, col2, sheet_index }) => {
        if (!initialized) return;
        if (!remoteCursors[username]) remoteCursors[username] = {};
        remoteCursors[username] = { color, row, col, row2, col2, sheet_index };
        renderCursor(username, color, row, col, row2, col2, sheet_index);
    });
}

// ── 접속자 아바타 ─────────────────────────────
function getInitials(name) {
    return name.length >= 2 ? name.slice(-2) : name;
}
function renderAvatars(users) {
    const container = document.getElementById('userAvatars');
    container.innerHTML = '';
    // 본인 먼저
    container.appendChild(makeAvatar(MY_NAME, MY_COLOR, true));
    users.filter(u => u.username !== MY_NAME)
         .forEach(u => container.appendChild(makeAvatar(u.username, u.color, false)));
}
function makeAvatar(username, color, isMe) {
    const el = document.createElement('div');
    el.className = 'avatar';
    el.id = `avatar-${username}`;
    el.style.background = color;
    el.innerHTML = `${getInitials(username)}<span class="tooltip">${username}${isMe ? ' (나)' : ''}</span>`;
    return el;
}
function addAvatar(username, color) {
    if (document.getElementById(`avatar-${username}`)) return;
    document.getElementById('userAvatars').appendChild(makeAvatar(username, color, false));
}
function removeAvatar(username) {
    document.getElementById(`avatar-${username}`)?.remove();
}

// ── 커서 오버레이 ─────────────────────────────
/*
 * Luckysheet 셀 픽셀 좌표 계산:
 *   누적 행 높이 / 열 너비를 sheet config에서 읽어 계산.
 *   기본값: 행 19px, 열 73px (Luckysheet 기본값)
 *   + 행 헤더 46px, 열 헤더 20px 오프셋
 *   - 스크롤 오프셋 보정
 */
const ROW_HEADER_W  = 46;
const COL_HEADER_H  = 20;
const DEFAULT_ROW_H = 19;
const DEFAULT_COL_W = 73;

function getCellRect(row, col, row2, col2) {
    try {
        const sheets  = luckysheet.getAllSheets();
        const curSheet = sheets.find(s => s.status === 1) || sheets[0];
        const config   = curSheet.config || {};
        const rowlen   = config.rowlen   || {};
        const colLen   = config.columnlen || {};

        let top = COL_HEADER_H, left = ROW_HEADER_W;
        for (let r = 0; r < row;  r++) top  += (rowlen[r] || DEFAULT_ROW_H);
        for (let c = 0; c < col;  c++) left += (colLen[c] || DEFAULT_COL_W);

        let w = 0, h = 0;
        for (let r = row;  r <= row2;  r++) h += (rowlen[r] || DEFAULT_ROW_H);
        for (let c = col;  c <= col2;  c++) w += (colLen[c] || DEFAULT_COL_W);

        // 스크롤 오프셋
        const scrollX = document.getElementById('luckysheet-scrollbar-x')?.scrollLeft || 0;
        const scrollY = document.getElementById('luckysheet-scrollbar-y')?.scrollTop  || 0;

        return { top: top - scrollY, left: left - scrollX, width: w, height: h };
    } catch { return null; }
}

function renderCursor(username, color, row, col, row2, col2, sheetIndex) {
    // 현재 시트가 아니면 커서 숨김
    const curIndex = getCurrentSheetIndex();
    let el = document.getElementById(`cursor-${username}`);

    if (String(sheetIndex) !== String(curIndex)) {
        if (el) el.style.display = 'none';
        return;
    }

    const rect = getCellRect(row, col, row2, col2);
    if (!rect) return;

    if (!el) {
        el = document.createElement('div');
        el.id = `cursor-${username}`;
        el.className = 'remote-cursor';
        const label = document.createElement('div');
        label.className = 'remote-cursor-label';
        label.id = `cursor-label-${username}`;
        label.textContent = username;
        el.appendChild(label);
        document.getElementById('cursorOverlay').appendChild(el);
    }

    el.style.display   = 'block';
    el.style.borderColor = color;
    el.style.top       = rect.top    + 'px';
    el.style.left      = rect.left   + 'px';
    el.style.width     = rect.width  + 'px';
    el.style.height    = rect.height + 'px';

    document.getElementById(`cursor-label-${username}`).style.background = color;
}

function removeCursorEl(username) {
    document.getElementById(`cursor-${username}`)?.remove();
}

// 스크롤 시 커서 위치 재계산
document.addEventListener('scroll', refreshCursors, true);
function refreshCursors() {
    Object.entries(remoteCursors).forEach(([username, data]) => {
        if (data.row !== undefined) {
            renderCursor(username, data.color, data.row, data.col,
                         data.row2 ?? data.row, data.col2 ?? data.col, data.sheet_index);
        }
    });
}

// ── 한국어 폰트 주입 ──────────────────────────
function injectKoreanFonts() {
    const koreanFonts = [
        { name: '맑은 고딕',    value: 'Malgun Gothic' },
        { name: '나눔고딕',     value: 'Nanum Gothic' },
        { name: '나눔명조',     value: 'Nanum Myeongjo' },
        { name: '굴림',        value: 'Gulim' },
        { name: '돋움',        value: 'Dotum' },
        { name: '바탕',        value: 'Batang' },
        { name: '궁서',        value: 'Gungsuh' },
        { name: 'Noto Sans KR', value: 'Noto Sans KR' },
    ];

    function tryInject() {
        document.querySelectorAll('select').forEach(sel => {
            const opts = [...sel.options];
            if (!opts.some(o => o.text.includes('Arial') || o.text.includes('Times'))) return;
            if (opts.some(o => o.value === 'Malgun Gothic')) return;
            const sep = document.createElement('option');
            sep.disabled = true; sep.text = '── 한국어 폰트 ──';
            sel.appendChild(sep);
            koreanFonts.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.value; opt.text = f.name;
                opt.style.fontFamily = f.value;
                sel.appendChild(opt);
            });
        });

        document.querySelectorAll('.luckysheet-fontfamily-pane,[id*="luckysheet-font"]').forEach(ul => {
            if (ul.dataset.krPatched) return;
            ul.dataset.krPatched = '1';
            const div = document.createElement('li');
            div.style.cssText = 'padding:4px 8px;color:#999;font-size:11px;border-top:1px solid #eee;cursor:default;';
            div.textContent = '── 한국어 폰트 ──';
            ul.appendChild(div);
            koreanFonts.forEach(f => {
                const li = document.createElement('li');
                li.style.cssText = `font-family:${f.value};padding:4px 12px;cursor:pointer;`;
                li.textContent = f.name;
                li.addEventListener('click', () => luckysheet.setRangeStyle({ 'font-family': f.value }));
                ul.appendChild(li);
            });
        });
    }

    tryInject();
    setTimeout(tryInject, 500);
    document.addEventListener('click', e => {
        if (e.target.closest('[class*="font"],[id*="font"]')) setTimeout(tryInject, 100);
    }, true);
    new MutationObserver(ms => {
        ms.forEach(m => m.addedNodes.forEach(n => {
            if (n.nodeType === 1 && String(n.className||n.id||'').includes('font')) setTimeout(tryInject, 50);
        }));
    }).observe(document.body, { childList: true, subtree: true });
}

    function patchEl(el) {
        ['title','data-tips','placeholder','alt'].forEach(a => {
            const v = el.getAttribute(a);
            if (!v) return;
            const t = v.trim();
            if (map[t]) { el.setAttribute(a, map[t]); return; }
            // 대소문자 무시 매칭
            const tLow = t.toLowerCase();
            for (const [k, kr] of Object.entries(map)) {
                if (k.toLowerCase() === tLow) { el.setAttribute(a, kr); break; }
            }
        });
        el.childNodes.forEach(n => {
            if (n.nodeType === 3) {
                const t = n.textContent.trim();
                if (t && map[t]) n.textContent = n.textContent.replace(t, map[t]);
            }
        });
    }
    function patchTree(root) {
        if (!root || root.nodeType !== 1) return;
        if (['SCRIPT','STYLE','INPUT','TEXTAREA'].includes(root.tagName)) return;
        patchEl(root);
        root.childNodes.forEach(c => patchTree(c));
    }

    // 함수 모달 내 영문 설명 → 한글 치환 (TreeWalker 기반)
    function patchFuncModal(root) {
        if (!root || root.nodeType !== 1) return;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while ((node = walker.nextNode())) {
            const t = node.textContent.trim();
            if (t && engDescMap[t]) {
                node.textContent = node.textContent.replace(t, engDescMap[t]);
            }
        }
    }

    // li 요소에서 함수명으로 설명 직접 교체 (함수명 기반 보조)
    function patchFuncListItems(root) {
        if (!root || !root.querySelectorAll) return;
        root.querySelectorAll('li').forEach(li => {
            // 텍스트 노드들 추출
            const textNodes = [];
            li.childNodes.forEach(n => { if (n.nodeType === 3) textNodes.push(n); });
            // 첫 번째 텍스트 노드 = 함수명, 이후 = 설명
            let fname = '';
            // 또는 첫 element에서 함수명 찾기
            const firstEl = li.firstElementChild;
            if (firstEl) fname = firstEl.textContent.trim().toUpperCase();
            else if (textNodes[0]) fname = textNodes[0].textContent.trim().toUpperCase();

            if (fname && funcDescMap[fname]) {
                // 설명 텍스트 노드 교체
                textNodes.forEach(n => {
                    const t = n.textContent.trim();
                    if (t && t !== fname && t.length > 3) {
                        n.textContent = ' ' + funcDescMap[fname];
                    }
                });
                // 설명 span/p 교체
                if (firstEl) {
                    const descEl = li.querySelector('p, span:nth-child(2), div');
                    if (descEl) descEl.textContent = funcDescMap[fname];
                }
            }
        });
    }

    function runFuncPatch(root) {
        patchFuncModal(root);
        patchFuncListItems(root);
    }

    patchTree(document.body);
    new MutationObserver(ms => {
        ms.forEach(m => {
            m.addedNodes.forEach(n => {
                if (n.nodeType === 1) {
                    patchTree(n);
                    // 모달 또는 목록 관련 노드면 함수 설명도 패치
                    const cls = String(n.className || '');
                    if (cls.includes('luckysheet') || cls.includes('modal') || n.tagName === 'LI') {
                        setTimeout(() => runFuncPatch(n), 30);
                        setTimeout(() => runFuncPatch(n), 150);
                    }
                }
            });
            if (m.type === 'attributes' && m.target) patchEl(m.target);
            // 텍스트 변경 감지
            if (m.type === 'characterData' && m.target) {
                const t = m.target.textContent.trim();
                if (t && engDescMap[t]) m.target.textContent = engDescMap[t];
                if (t && map[t]) m.target.textContent = map[t];
            }
        });
    }).observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true, attributeFilter: ['title','data-tips'] });

    // 함수 목록 클릭/스크롤 시 재패치
    document.addEventListener('click', () => {
        setTimeout(() => runFuncPatch(document.body), 60);
        setTimeout(() => runFuncPatch(document.body), 200);
    }, true);
    document.addEventListener('change', () => setTimeout(() => runFuncPatch(document.body), 100), true);
}

// ── Luckysheet 툴팁 스타일 강제 적용 ──────────
// 실제 툴팁: #luckysheet-tooltip-up, 표시는 jfk-tooltip-hide 클래스 제거로 제어
(function fixTooltip() {
    const TIP_BG  = 'rgba(28,28,48,0.96)';
    const TIP_COL = '#f0f0f0';

    function applyStyle(el) {
        el.style.setProperty('background', TIP_BG, 'important');
        el.style.setProperty('color', TIP_COL, 'important');
        el.style.setProperty('border', '1px solid rgba(120,120,180,0.3)', 'important');
        el.style.setProperty('box-shadow', '0 3px 12px rgba(0,0,0,0.5)', 'important');
        el.style.setProperty('border-radius', '6px', 'important');
        el.style.setProperty('z-index', '9999', 'important');
        // 내부 텍스트 색
        el.querySelectorAll('*').forEach(c => c.style.setProperty('color', TIP_COL, 'important'));
    }

    function checkTooltip() {
        const tip = document.getElementById('luckysheet-tooltip-up');
        if (tip && !tip.classList.contains('jfk-tooltip-hide')) {
            applyStyle(tip);
        }
    }

    // 1) 툴팁이 최초 DOM에 추가될 때 (body에 append)
    new MutationObserver(ms => {
        ms.forEach(m => {
            // 신규 추가
            m.addedNodes.forEach(n => {
                if (n.nodeType === 1 && n.id === 'luckysheet-tooltip-up') applyStyle(n);
            });
            // class 변경으로 show/hide 제어
            if (m.type === 'attributes' && m.attributeName === 'class') {
                const el = m.target;
                if (el.id === 'luckysheet-tooltip-up' && !el.classList.contains('jfk-tooltip-hide')) {
                    applyStyle(el);
                }
            }
        });
    }).observe(document.body, {
        childList: true, subtree: true,
        attributes: true, attributeFilter: ['class']
    });

    // 2) 이미 DOM에 있으면 즉시 적용 (초기화 시)
    const existing = document.getElementById('luckysheet-tooltip-up');
    if (existing) applyStyle(existing);
})();

// ── 시작 ──────────────────────────────────────
initSheet();
