<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 메모</title>

    <!-- PWA 메타 태그 -->
    <meta name="description" content="개인 메모 관리">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="하루CRM">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/js/sw-register.js"></script>
    <script src="/static/js/sw-auto-update.js"></script>
    <script src="/static/js/push-notifications.js" defer></script>
    <link rel="stylesheet" href="/static/css/loading-spinner.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* 헤더 */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .page-header h1 { color: #333; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-buttons a, .nav-buttons button { padding: 10px 18px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; transition: all 0.2s; }
        .nav-buttons a:hover, .nav-buttons button:hover { background: #5568d3; transform: translateY(-1px); }

        /* 메인 레이아웃 */
        .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; min-height: calc(100vh - 150px); }

        /* 사이드바 - 폴더 트리 */
        .sidebar { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h3 { font-size: 16px; color: #333; }
        .sidebar-actions { display: flex; gap: 8px; }
        .icon-btn { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; }
        .icon-btn.primary { background: #667eea; color: white; }
        .icon-btn.primary:hover { background: #5568d3; }
        .icon-btn.secondary { background: #f0f0f0; color: #666; }
        .icon-btn.secondary:hover { background: #e0e0e0; }

        /* 검색 */
        .search-box { padding: 15px; border-bottom: 1px solid #e9ecef; }
        .search-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .search-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

        /* 폴더 리스트 */
        .folder-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .folder-item { display: flex; align-items: center; padding: 10px 15px; cursor: pointer; transition: all 0.2s; gap: 10px; width: 100%; border: none; background: transparent; text-align: left; font-family: inherit; }
        .folder-item:hover { background: #f8f9fa; }
        .folder-item.active { background: #667eea; color: white; }
        .folder-item.active .folder-icon { color: white; }
        .folder-item.active .folder-count { background: rgba(255,255,255,0.3); color: white; }
        .folder-icon { font-size: 18px; color: #ffc107; flex-shrink: 0; }
        .folder-name { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-count { font-size: 12px; padding: 2px 8px; background: #e9ecef; border-radius: 10px; color: #666; }
        .folder-item.root .folder-icon { color: #667eea; }
        .folder-depth-1 { padding-left: 35px; }
        .folder-depth-2 { padding-left: 55px; }
        .folder-depth-3 { padding-left: 75px; }

        /* 폴더 접기/펼치기 */
        .folder-toggle { width: 20px; height: 20px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; transition: transform 0.2s; flex-shrink: 0; border-radius: 4px; margin-left: -5px; }
        .folder-toggle:hover { background: rgba(0,0,0,0.05); color: #667eea; }
        .folder-toggle.expanded { transform: rotate(90deg); }
        .folder-item.active .folder-toggle { color: rgba(255,255,255,0.8); }
        .folder-item.active .folder-toggle:hover { background: rgba(255,255,255,0.2); color: white; }
        .folder-children { overflow: hidden; transition: max-height 0.3s ease; }
        .folder-children.collapsed { max-height: 0 !important; }
        .folder-add-child { font-size: 14px; color: #999; opacity: 0; transition: opacity 0.2s; margin-left: auto; padding: 2px 6px; border-radius: 4px; }
        .folder-item:hover .folder-add-child { opacity: 1; }
        .folder-add-child:hover { background: rgba(102, 126, 234, 0.1); color: #667eea; }
        .folder-item.active .folder-add-child { color: rgba(255,255,255,0.7); }
        .folder-item.active .folder-add-child:hover { background: rgba(255,255,255,0.2); color: white; }

        /* 드래그 앤 드롭 */
        .folder-item.drag-over { background: #e8f4fd; border: 2px dashed #667eea; }
        .folder-item.drag-over.active { background: #5568d3; border: 2px dashed #fff; }

        /* 메인 영역 */
        .main-content { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .content-header h2 { font-size: 18px; color: #333; display: flex; align-items: center; gap: 8px; }
        .breadcrumb { font-size: 14px; color: #666; display: flex; align-items: center; gap: 5px; }
        .breadcrumb span { cursor: pointer; }
        .breadcrumb span:hover { color: #667eea; }
        .breadcrumb .separator { color: #ccc; }

        /* 메모 리스트 */
        .memo-list { flex: 1; overflow-y: auto; }
        .memo-item { display: flex; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: all 0.2s; gap: 15px; align-items: flex-start; }
        .memo-item:hover { background: #f8f9fa; }
        .memo-item.active { background: #f0f4ff; border-left: 3px solid #667eea; }
        .memo-item.dragging { opacity: 0.5; background: #e3e8f0; }
        .memo-item[draggable="true"] { cursor: grab; }
        .memo-item[draggable="true"]:active { cursor: grabbing; }
        .memo-pin { font-size: 14px; color: #ffc107; flex-shrink: 0; }
        .memo-favorite { font-size: 14px; color: #ffc107; flex-shrink: 0; cursor: pointer; transition: transform 0.2s; }
        .memo-favorite:hover { transform: scale(1.2); }
        .memo-favorite.inactive { color: #ddd; }
        .memo-favorite.inactive:hover { color: #ffc107; }
        .memo-info { flex: 1; min-width: 0; }
        .memo-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .memo-preview { font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .memo-meta { font-size: 12px; color: #999; margin-top: 5px; }
        .memo-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s; }
        .memo-item:hover .memo-actions { opacity: 1; }

        /* 메모 에디터 */
        .memo-editor { display: none; flex: 1; flex-direction: column; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
        .editor-header { padding: 20px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .editor-title { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; font-weight: 600; }
        .editor-title:focus { outline: none; border-color: #667eea; }
        .editor-body { flex: 1; padding: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .editor-content { flex: 1; width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; line-height: 1.8; resize: none; font-family: inherit; }
        .editor-content:focus { outline: none; border-color: #667eea; }
        .editor-footer { padding: 15px 20px; border-top: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; }
        .editor-meta { font-size: 13px; color: #666; }
        .editor-actions { display: flex; gap: 10px; }

        /* 버튼 */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-outline { background: transparent; border: 1px solid #ddd; color: #666; }
        .btn-outline:hover { background: #f8f9fa; border-color: #ccc; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }

        /* 빈 상태 */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; margin-bottom: 10px; color: #666; }
        .empty-state p { font-size: 14px; margin-bottom: 20px; }

        /* 모달 */
        .modal-overlay { display: none !important; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex !important; }
        .modal { position: relative; z-index: 10001; }
        .modal { background: white; border-radius: 12px; padding: 25px; max-width: 400px; width: 90%; animation: modalIn 0.2s ease-out; }
        @keyframes modalIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .modal h3 { font-size: 18px; margin-bottom: 20px; color: #333; }
        .modal-input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 20px; }
        .modal-input:focus { outline: none; border-color: #667eea; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

        /* 컨텍스트 메뉴 */
        .context-menu { display: none; position: fixed; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 8px 0; z-index: 1001; min-width: 160px; }
        .context-menu.show { display: block; }
        .context-menu-item { padding: 10px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
        .context-menu-item:hover { background: #f0f4ff; }
        .context-menu-item.danger { color: #dc3545; }
        .context-menu-divider { height: 1px; background: #e9ecef; margin: 5px 0; }

        /* 토스트 */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: toastIn 0.3s; }
        @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }

        /* 폴더 이동 모달 */
        .folder-select { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        .folder-select-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
        .folder-select-item:hover { background: #f8f9fa; }
        .folder-select-item.selected { background: #f0f4ff; border-left: 3px solid #667eea; }

        /* 모바일 버튼 기본 숨김 (데스크탑) */
        .mobile-menu-btn { display: none !important; }
        .mobile-close-btn { display: none !important; }

        /* 반응형 - 모바일 최적화 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 0; }

            /* 모바일 토글 버튼 표시 */
            .mobile-menu-btn { display: inline-flex !important; }

            /* 헤더 */
            .memo-header { margin: 10px 0 !important; }
            .memo-header h2 { font-size: 18px !important; }

            /* 개인정보 보호 안내 */
            .privacy-notice { padding: 10px 12px !important; margin-bottom: 12px !important; flex-direction: column !important; text-align: center; gap: 8px !important; }
            .privacy-notice span:first-child { font-size: 24px !important; }
            .privacy-notice p { font-size: 12px !important; line-height: 1.4; }

            /* 메인 레이아웃 - 모바일에서 세로 배치 */
            .main-layout { grid-template-columns: 1fr; gap: 12px; min-height: auto; }

            /* 사이드바 (폴더) - 아코디언 방식 */
            .sidebar {
                display: none;
                border-radius: 10px;
                margin-bottom: 12px;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
            }
            .sidebar.mobile-show {
                display: block !important;
                max-height: 400px;
                overflow: visible;
            }
            .sidebar-header {
                padding: 15px;
            }
            .sidebar-header h3 { font-size: 15px; font-weight: 600; }
            #newFolderBtn { padding: 8px 12px !important; font-size: 13px !important; }

            .search-box { padding: 10px 15px; }
            .search-input { padding: 10px 12px; font-size: 15px; }

            /* 폴더 리스트 */
            .folder-list {
                max-height: 250px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            .folder-item {
                padding: 12px 15px !important;
            }
            .folder-item:active {
                background: rgba(102, 126, 234, 0.2) !important;
            }
            .folder-name { font-size: 14px; }

            /* 닫기 버튼 숨김 (아코디언이므로 불필요) */
            .mobile-close-btn { display: none !important; }

            /* 메인 콘텐츠 */
            .main-content { border-radius: 10px; }
            .content-header { padding: 15px; flex-direction: row !important; align-items: center !important; justify-content: space-between; }
            .content-header h2 { font-size: 16px; }
            .content-header .btn { padding: 10px 16px; font-size: 14px; }

            /* 메모 리스트 */
            .memo-item { padding: 14px 15px; gap: 12px; }
            .memo-title { font-size: 15px; }
            .memo-preview { font-size: 13px; }
            .memo-meta { font-size: 11px; }
            .memo-actions { opacity: 1 !important; }

            /* 메모 에디터 */
            .memo-editor { border-radius: 10px; }
            .editor-header { padding: 12px 15px; flex-wrap: wrap; gap: 10px; }
            .editor-title { width: 100%; font-size: 16px; padding: 12px 14px; order: 1; }
            .editor-actions { width: 100%; order: 2; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
            .editor-actions .btn-save-main { flex: 1; min-width: 80px; padding: 12px !important; font-size: 15px !important; }
            .editor-actions .btn { padding: 10px 12px; font-size: 13px; }
            .editor-body { padding: 12px 15px; }
            .editor-content { font-size: 16px; line-height: 1.7; padding: 14px; }
            .editor-footer { padding: 12px 15px; flex-direction: column; gap: 8px; align-items: flex-start !important; }
            .editor-meta { font-size: 12px; }

            /* 민감정보 경고 */
            #sensitiveWarning { padding: 12px !important; font-size: 14px !important; }

            /* 빈 상태 */
            .empty-state { padding: 40px 20px; }
            .empty-state .icon { font-size: 48px; }
            .empty-state h3 { font-size: 16px; }
            .empty-state p { font-size: 13px; }

            /* 모달 */
            .modal { padding: 20px; max-width: 95%; width: 100%; margin: 10px; }
            .modal h3 { font-size: 17px; margin-bottom: 16px; }
            .modal-input { padding: 14px 16px; font-size: 16px; margin-bottom: 16px; }
            .modal-actions { gap: 10px; }
            .modal-actions .btn { flex: 1; padding: 14px; font-size: 15px; justify-content: center; }

            /* 폴더 선택 (이동 모달) */
            .folder-select { max-height: 250px; }
            .folder-select-item { padding: 14px 15px; font-size: 15px; touch-action: manipulation; -webkit-tap-highlight-color: rgba(102, 126, 234, 0.3); }
            .folder-select-item.selected { background: #667eea !important; color: white !important; }
            .folder-select-item.selected span { color: white !important; }

            /* 컨텍스트 메뉴 */
            .context-menu { min-width: 180px; }
            .context-menu-item { padding: 14px 18px; font-size: 15px; }

            /* 토스트 */
            .toast { padding: 14px 24px; font-size: 14px; bottom: 20px; left: 10px; right: 10px; transform: none; text-align: center; }
        }

        /* 태블릿 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .main-layout { grid-template-columns: 240px 1fr; gap: 15px; }
            .sidebar-header h3 { font-size: 15px; }
            .folder-item { padding: 10px 12px; }
        }

        /* 다크모드 */
        [data-theme="dark"] body { background: linear-gradient(180deg, #0f0f1a 0%, #1a1025 50%, #0f0f1a 100%); }
        [data-theme="dark"] .sidebar, [data-theme="dark"] .main-content, [data-theme="dark"] .memo-editor { background: linear-gradient(145deg, #1e1e38 0%, #252550 100%); border: 1px solid rgba(96, 165, 250, 0.2); }
        [data-theme="dark"] .page-header h1, [data-theme="dark"] .memo-header h2 { color: #fff; }
        [data-theme="dark"] .sidebar-header, [data-theme="dark"] .content-header, [data-theme="dark"] .editor-header, [data-theme="dark"] .editor-footer { border-color: rgba(96, 165, 250, 0.2); }
        [data-theme="dark"] .sidebar-header h3, [data-theme="dark"] .content-header h2 { color: #fff; }
        [data-theme="dark"] .search-input, [data-theme="dark"] .editor-title, [data-theme="dark"] .editor-content, [data-theme="dark"] .modal-input { background: #1e1e38; color: #fff; border-color: rgba(96, 165, 250, 0.3); }
        [data-theme="dark"] .folder-item:hover, [data-theme="dark"] .memo-item:hover { background: rgba(96, 165, 250, 0.1); }
        [data-theme="dark"] .folder-item.active { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
        [data-theme="dark"] .folder-toggle { color: #a1a1aa; }
        [data-theme="dark"] .folder-toggle:hover { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
        [data-theme="dark"] .folder-add-child { color: #a1a1aa; }
        [data-theme="dark"] .folder-add-child:hover { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
        [data-theme="dark"] .memo-item.active { background: rgba(96, 165, 250, 0.15); border-left-color: #60a5fa; }
        [data-theme="dark"] .memo-title { color: #fff; }
        [data-theme="dark"] .memo-preview, [data-theme="dark"] .memo-meta, [data-theme="dark"] .editor-meta { color: #a1a1aa; }
        [data-theme="dark"] .modal { background: linear-gradient(145deg, #1e1e38 0%, #252550 100%); }
        [data-theme="dark"] .modal h3 { color: #fff; }
        [data-theme="dark"] .context-menu { background: #252550; }
        [data-theme="dark"] .context-menu-item:hover { background: rgba(96, 165, 250, 0.15); }
        [data-theme="dark"] .context-menu-divider { background: rgba(96, 165, 250, 0.2); }
        [data-theme="dark"] .empty-state h3 { color: #e5e7eb; }
        [data-theme="dark"] .folder-select { border-color: rgba(96, 165, 250, 0.3); }
        [data-theme="dark"] .folder-select-item:hover { background: rgba(96, 165, 250, 0.1); }
        [data-theme="dark"] .breadcrumb span:hover { color: #60a5fa; }
        [data-theme="dark"] .btn-outline { border-color: rgba(96, 165, 250, 0.3); color: #e5e7eb; }
        [data-theme="dark"] .btn-outline:hover { background: rgba(96, 165, 250, 0.1); }
        [data-theme="dark"] .privacy-notice { background: linear-gradient(135deg, #3d3200 0%, #4a3d00 100%) !important; border-color: #ffc107 !important; }
        [data-theme="dark"] .privacy-notice strong, [data-theme="dark"] .privacy-notice p { color: #ffd54f !important; }
        [data-theme="dark"] #sensitiveWarning { background: linear-gradient(135deg, #4a1a1a 0%, #5c2020 100%) !important; border-color: #dc3545 !important; color: #f8b4b4 !important; }
        [data-theme="dark"] .mobile-close-btn { background: rgba(255,255,255,0.15) !important; color: #fff !important; }
        [data-theme="dark"] .memo-header h2 { color: #fff !important; }
    </style>
</head>
<body data-page="memos">
    <!-- 메모 페이지에서는 터치 제스처 스크립트 비활성화 -->
    <script>window.DISABLE_TOUCH_GESTURES = true;</script>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        {% include 'includes/header.html' %}

        <div class="memo-header" style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0; flex-wrap: wrap; gap: 10px;">
            <h2 style="margin: 0; color: #333;">📝 내 메모</h2>
            <button class="mobile-menu-btn" onclick="toggleSidebar()" style="padding: 10px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);">📁 폴더 보기</button>
        </div>

        <!-- 개인정보 보호 안내 -->
        <div class="privacy-notice" style="background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%); border: 1px solid #ffc107; border-left: 4px solid #ff9800; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 20px;">🔒</span>
            <div style="flex: 1;">
                <strong style="color: #856404;">개인정보 보호</strong>
                <p style="margin: 4px 0 0 0; font-size: 13px; color: #856404;">전화번호, 생년월일은 저장할 수 없습니다. <strong>CU.</strong>(고객번호), <strong>CO.</strong>(상담번호), <strong>RP</strong>(품목코드)는 허용됩니다.</p>
            </div>
        </div>

        <div class="main-layout">
            <!-- 사이드바 - 폴더 트리 -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>📁 폴더</h3>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <button type="button" id="newFolderBtn" style="padding: 8px 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; font-weight: 500;">
                            <span>➕</span> 새 폴더
                        </button>
                        <button class="mobile-close-btn" onclick="toggleSidebar()">✕</button>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="메모 검색..." oninput="searchMemos(this.value)">
                </div>
                <div class="folder-list" id="folderList">
                    <!-- 동적으로 로드 -->
                </div>
            </div>

            <!-- 메인 영역 - 메모 리스트 -->
            <div class="main-content" id="mainContent">
                <div class="content-header">
                    <h2 id="contentTitle">📄 모든 메모</h2>
                    <button class="btn btn-primary" onclick="createNewMemo()">✏️ 새 메모</button>
                </div>
                <div class="memo-list" id="memoList">
                    <!-- 동적으로 로드 -->
                </div>
            </div>

            <!-- 메모 에디터 -->
            <div class="memo-editor" id="memoEditor">
                <div class="editor-header">
                    <input type="text" class="editor-title" id="editorTitle" placeholder="제목을 입력하세요">
                    <div class="editor-actions">
                        <button type="button" class="btn-save-main" onclick="saveMemo()" style="padding: 8px 20px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 2px 8px rgba(40, 167, 69, 0.3);">💾 저장</button>
                        <button class="btn btn-outline btn-sm" onclick="pinMemo()"><span id="pinIcon">📌</span></button>
                        <button class="btn btn-outline btn-sm" onclick="favoriteMemo()"><span id="favoriteIcon">☆</span></button>
                        <button class="btn btn-outline btn-sm" onclick="showMoveMemoModal()">📁 이동</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteMemo()">🗑️</button>
                        <button class="btn btn-secondary btn-sm" onclick="closeEditor()">✕</button>
                    </div>
                </div>
                <div class="editor-body">
                    <!-- 민감정보 경고 배너 (실시간 감지) -->
                    <div id="sensitiveWarning" style="display: none; background: #f8d7da; border: 1px solid #f5c6cb; border-left: 4px solid #dc3545; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #721c24;">
                        <strong>⚠️ 저장 불가:</strong> <span id="sensitiveWarningText"></span>
                    </div>
                    <textarea class="editor-content" id="editorContent" placeholder="내용을 입력하세요..."></textarea>
                </div>
                <div class="editor-footer">
                    <span class="editor-meta" id="editorMeta"></span>
                    <span style="font-size: 12px; color: #999;">자동 저장 (3초)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 새 폴더 모달 -->
    <div class="modal-overlay" id="folderModal">
        <div class="modal">
            <h3 id="folderModalTitle">📁 새 폴더</h3>
            <input type="text" class="modal-input" id="folderNameInput" placeholder="폴더 이름">
            <div id="parentFolderSection" style="margin-top: 12px;">
                <label style="font-size: 13px; color: #666; display: block; margin-bottom: 6px;">상위 폴더</label>
                <select id="parentFolderSelect" class="modal-input" style="padding: 10px 12px;">
                    <option value="">루트 (최상위)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeFolderModal()">취소</button>
                <button class="btn btn-primary" onclick="saveFolderModal()">저장</button>
            </div>
        </div>
    </div>

    <!-- 폴더 이동 모달 -->
    <div class="modal-overlay" id="moveModal">
        <div class="modal" style="max-width: 450px;">
            <h3>📁 이동할 폴더 선택</h3>
            <div class="folder-select" id="folderSelectList">
                <!-- 동적으로 로드 -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeMoveModal()">취소</button>
                <button class="btn btn-primary" onclick="confirmMove()">이동</button>
            </div>
        </div>
    </div>

    <!-- 컨텍스트 메뉴 -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="contextAction('rename')">✏️ 이름 변경</div>
        <div class="context-menu-item" onclick="contextAction('move')">📁 이동</div>
        <div class="context-menu-item folder-only" onclick="contextAction('addChild')">➕ 하위 폴더 추가</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" onclick="contextAction('delete')">🗑️ 삭제</div>
    </div>

    <script>
        // 상태 관리
        let folders = [];
        let memos = [];
        let currentFolderId = null;
        let currentMemoId = null;
        let isEditing = false;
        let contextTarget = null;
        let contextType = null;
        let selectedMoveFolder = null;
        let editingFolderId = null;
        let newFolderParentId = null;  // 새 폴더 생성 시 부모 폴더
        let expandedFolders = new Set();  // 펼쳐진 폴더 ID 저장

        // 민감정보 패턴 (클라이언트 측 실시간 감지용)
        const sensitivePatterns = {
            phone: [
                /01[016789][-.\s]?\d{3,4}[-.\s]?\d{4}/,
                /01[016789]\d{7,8}/
            ],
            landline: [
                /0\d{1,2}[-.\s]?\d{3,4}[-.\s]?\d{4}/
            ],
            birthdate: [
                /\b(19[2-9]\d|200\d|201[0-5])[-./]?(0[1-9]|1[0-2])[-./]?(0[1-9]|[12]\d|3[01])\b/,
                /\b[2-9]\d[-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])\b/,
                /\b[0-1][0-5][-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])\b/
            ]
        };

        // 민감정보 실시간 감지
        function checkSensitiveInfo(text) {
            if (!text) return { hasSensitive: false };

            // 허용 패턴 제거: CU., CO. (고객ID), RP (품목코드)
            let textForCheck = text;
            textForCheck = textForCheck.replace(/\b(CU|CO)\.[A-Za-z0-9]+/gi, '');
            textForCheck = textForCheck.replace(/\bRP\d{10,}/gi, '');

            for (const pattern of sensitivePatterns.phone) {
                if (pattern.test(textForCheck)) {
                    return { hasSensitive: true, type: '휴대폰 번호가 감지되었습니다' };
                }
            }
            for (const pattern of sensitivePatterns.landline) {
                if (pattern.test(textForCheck)) {
                    return { hasSensitive: true, type: '전화번호(국선)가 감지되었습니다' };
                }
            }
            for (const pattern of sensitivePatterns.birthdate) {
                if (pattern.test(textForCheck)) {
                    return { hasSensitive: true, type: '생년월일이 감지되었습니다' };
                }
            }
            return { hasSensitive: false };
        }

        // 경고 배너 표시/숨김
        function updateSensitiveWarning() {
            const title = document.getElementById('editorTitle').value;
            const content = document.getElementById('editorContent').value;
            const fullText = title + '\n' + content;

            const result = checkSensitiveInfo(fullText);
            const warningDiv = document.getElementById('sensitiveWarning');
            const warningText = document.getElementById('sensitiveWarningText');
            const saveBtn = document.querySelector('.btn-save-main');

            if (result.hasSensitive) {
                warningDiv.style.display = 'block';
                warningText.textContent = result.type + ' (CU. 또는 CO.로 시작하면 허용)';
                if (saveBtn) {
                    saveBtn.style.opacity = '0.5';
                    saveBtn.style.cursor = 'not-allowed';
                }
            } else {
                warningDiv.style.display = 'none';
                if (saveBtn) {
                    saveBtn.style.opacity = '1';
                    saveBtn.style.cursor = 'pointer';
                }
            }
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOMContentLoaded - 메모 페이지 초기화');

            // 새 폴더 버튼 이벤트 연결
            const newFolderBtn = document.getElementById('newFolderBtn');
            if (newFolderBtn) {
                newFolderBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('새 폴더 버튼 클릭됨');
                    showNewFolderModal();
                });
                console.log('새 폴더 버튼 이벤트 연결 완료');
            } else {
                console.error('새 폴더 버튼을 찾을 수 없음');
            }

            // 폴더 리스트 이벤트 설정 (한 번만)
            setupFolderListEvents();

            loadFolders();
            loadMemos();

            // 자동저장 (3초 디바운스) + 실시간 민감정보 감지
            let saveTimeout;
            const editorTitle = document.getElementById('editorTitle');
            const editorContent = document.getElementById('editorContent');

            if (editorTitle) {
                editorTitle.addEventListener('input', () => {
                    updateSensitiveWarning();
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(autoSave, 3000);
                });
            }
            if (editorContent) {
                editorContent.addEventListener('input', () => {
                    updateSensitiveWarning();
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(autoSave, 3000);
                });
            }

            // 클릭 이벤트로 컨텍스트 메뉴 닫기
            document.addEventListener('click', () => {
                const contextMenu = document.getElementById('contextMenu');
                if (contextMenu) contextMenu.classList.remove('show');
            });

            // 모바일 대응
            if (window.innerWidth <= 768) {
                const mobileBtn = document.querySelector('.mobile-menu-btn');
                if (mobileBtn) mobileBtn.style.display = 'inline-flex';
            }

            console.log('메모 페이지 초기화 완료');
        });

        // 폴더 로드
        async function loadFolders() {
            try {
                const response = await fetch('/api/memos/folders/tree');
                folders = await response.json();
                renderFolders();
            } catch (error) {
                console.error('폴더 로드 실패:', error);
            }
        }

        // 폴더를 트리 구조로 변환
        function buildFolderTree(flatFolders) {
            const folderMap = new Map();
            const rootFolders = [];

            // 모든 폴더를 맵에 저장
            flatFolders.forEach(folder => {
                folderMap.set(folder.id, { ...folder, children: [] });
            });

            // 부모-자식 관계 설정
            flatFolders.forEach(folder => {
                const folderNode = folderMap.get(folder.id);
                if (folder.parent_id && folderMap.has(folder.parent_id)) {
                    folderMap.get(folder.parent_id).children.push(folderNode);
                } else {
                    rootFolders.push(folderNode);
                }
            });

            return rootFolders;
        }

        // 폴더에 자식이 있는지 확인
        function hasChildren(folderId) {
            return folders.some(f => f.parent_id === folderId);
        }

        // 폴더 접기/펼치기 토글
        function toggleFolderExpand(folderId, event) {
            event.stopPropagation();
            if (expandedFolders.has(folderId)) {
                expandedFolders.delete(folderId);
            } else {
                expandedFolders.add(folderId);
            }
            renderFolders();
        }

        // 하위 폴더 추가 버튼 클릭
        function addChildFolder(parentId, event) {
            event.stopPropagation();
            showNewFolderModal(parentId);
        }

        // 폴더 렌더링
        function renderFolders() {
            const list = document.getElementById('folderList');
            // "전체"는 모든 메모를 보는 필터 (currentFolderId = null)
            // "즐겨찾기"는 즐겨찾기된 메모만 보기 (currentFolderId = 'favorites')
            // "루트"는 폴더에 속하지 않은 메모만 보기 (currentFolderId = 'root')
            let html = `
                <button type="button" class="folder-item ${currentFolderId === null ? 'active' : ''}" data-folder-id="null">
                    <span class="folder-icon">📋</span>
                    <span class="folder-name">전체 메모</span>
                </button>
                <button type="button" class="folder-item ${currentFolderId === 'favorites' ? 'active' : ''}" data-folder-id="favorites">
                    <span class="folder-icon">⭐</span>
                    <span class="folder-name">즐겨찾기</span>
                </button>
                <button type="button" class="folder-item ${currentFolderId === 'root' ? 'active' : ''}" data-folder-id="root"
                        ondragover="handleFolderDragOver(event)"
                        ondragleave="handleFolderDragLeave(event)"
                        ondrop="handleFolderDrop(event, 'root')">
                    <span class="folder-icon">📂</span>
                    <span class="folder-name">루트 (미분류)</span>
                </button>
            `;

            // 폴더를 depth 순서대로 렌더링 (이미 API에서 정렬되어 옴)
            folders.forEach(folder => {
                const depthClass = folder.depth > 0 ? `folder-depth-${Math.min(folder.depth, 3)}` : '';
                const hasChild = hasChildren(folder.id);
                const isExpanded = expandedFolders.has(folder.id);

                // 부모가 접혀있으면 숨김
                let isHidden = false;
                if (folder.parent_id) {
                    // 조상 폴더 중 하나라도 접혀있으면 숨김
                    let parentId = folder.parent_id;
                    while (parentId) {
                        if (!expandedFolders.has(parentId)) {
                            isHidden = true;
                            break;
                        }
                        const parentFolder = folders.find(f => f.id === parentId);
                        parentId = parentFolder ? parentFolder.parent_id : null;
                    }
                }

                const hiddenStyle = isHidden ? 'display: none;' : '';

                html += `
                    <button type="button" class="folder-item ${depthClass} ${currentFolderId === folder.id ? 'active' : ''}"
                         data-folder-id="${folder.id}"
                         style="${hiddenStyle}"
                         oncontextmenu="showContextMenu(event, 'folder', ${folder.id})"
                         ondragover="handleFolderDragOver(event)"
                         ondragleave="handleFolderDragLeave(event)"
                         ondrop="handleFolderDrop(event, ${folder.id})">
                        ${hasChild ? `<span class="folder-toggle ${isExpanded ? 'expanded' : ''}" onclick="toggleFolderExpand(${folder.id}, event)">▶</span>` : '<span style="width: 20px;"></span>'}
                        <span class="folder-icon">${hasChild ? '📂' : '📁'}</span>
                        <span class="folder-name">${escapeHtml(folder.name)}</span>
                        <span class="folder-add-child" onclick="addChildFolder(${folder.id}, event)" title="하위 폴더 추가">+</span>
                    </button>
                `;
            });

            list.innerHTML = html;
        }

        // 폴더 리스트 이벤트 위임 설정
        function setupFolderListEvents() {
            const folderList = document.getElementById('folderList');
            if (!folderList) return;

            // 클릭 이벤트 위임
            folderList.addEventListener('click', function(e) {
                const folderItem = e.target.closest('.folder-item');
                if (folderItem) {
                    const folderId = folderItem.dataset.folderId;
                    if (folderId === 'null') {
                        selectFolder(null);
                    } else if (folderId === 'root') {
                        selectFolder('root');
                    } else if (folderId === 'favorites') {
                        selectFolder('favorites');
                    } else {
                        selectFolder(parseInt(folderId));
                    }
                }
            });

            // 터치 이벤트 위임 (모바일용)
            let touchStartY = 0;
            let touchMoved = false;

            folderList.addEventListener('touchstart', function(e) {
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
            }, { passive: true });

            folderList.addEventListener('touchmove', function(e) {
                const touchY = e.touches[0].clientY;
                if (Math.abs(touchY - touchStartY) > 10) {
                    touchMoved = true;
                }
            }, { passive: true });

            folderList.addEventListener('touchend', function(e) {
                if (touchMoved) return; // 스크롤 중이면 무시

                const folderItem = e.target.closest('.folder-item');
                if (folderItem) {
                    e.preventDefault();
                    const folderId = folderItem.dataset.folderId;
                    if (folderId === 'null') {
                        selectFolder(null);
                    } else if (folderId === 'root') {
                        selectFolder('root');
                    } else {
                        selectFolder(parseInt(folderId));
                    }
                }
            }, { passive: false });
        }

        // 폴더 선택
        function selectFolder(folderId) {
            currentFolderId = folderId;
            renderFolders();
            loadMemos();

            // 타이틀 설정
            let title;
            if (folderId === null) {
                title = '📋 전체 메모';
            } else if (folderId === 'favorites') {
                title = '⭐ 즐겨찾기';
            } else if (folderId === 'root') {
                title = '📂 루트 (미분류)';
            } else {
                title = '📁 ' + (folders.find(f => f.id === folderId)?.name || '폴더');
            }
            document.getElementById('contentTitle').textContent = title;

            // 에디터가 열려있으면 닫기
            if (isEditing) {
                closeEditor();
            }

            // 모바일에서 폴더 선택 시 사이드바 닫기
            closeSidebarIfMobile();
        }

        // 메모 로드
        async function loadMemos() {
            try {
                let url;
                if (currentFolderId === null) {
                    // 전체 메모 (모든 폴더 포함)
                    url = '/api/memos';
                } else if (currentFolderId === 'favorites') {
                    // 즐겨찾기 메모
                    url = '/api/memos?folder_id=favorites';
                } else if (currentFolderId === 'root') {
                    // 루트 메모 (폴더에 속하지 않은 메모만)
                    url = '/api/memos?folder_id=root';
                } else {
                    // 특정 폴더의 메모
                    url = `/api/memos?folder_id=${currentFolderId}`;
                }
                const response = await fetch(url);
                memos = await response.json();
                renderMemos();
            } catch (error) {
                console.error('메모 로드 실패:', error);
            }
        }

        // 메모 렌더링
        function renderMemos() {
            const list = document.getElementById('memoList');

            if (memos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <h3>메모가 없습니다</h3>
                        <p>새 메모를 작성해보세요</p>
                        <button class="btn btn-primary" onclick="createNewMemo()">✏️ 새 메모 작성</button>
                    </div>
                `;
                return;
            }

            let html = '';
            memos.forEach(memo => {
                const preview = memo.content?.substring(0, 100) || '내용 없음';
                html += `
                    <div class="memo-item ${currentMemoId === memo.id ? 'active' : ''}"
                         draggable="true"
                         data-memo-id="${memo.id}"
                         onclick="openMemo(${memo.id})"
                         oncontextmenu="showContextMenu(event, 'memo', ${memo.id})"
                         ondragstart="handleMemoDragStart(event, ${memo.id})"
                         ondragend="handleMemoDragEnd(event)">
                        ${memo.is_pinned ? '<span class="memo-pin">📌</span>' : ''}
                        <span class="memo-favorite ${memo.is_favorite ? '' : 'inactive'}"
                              onclick="toggleFavorite(${memo.id}, event)"
                              title="${memo.is_favorite ? '즐겨찾기 해제' : '즐겨찾기 추가'}">
                            ${memo.is_favorite ? '⭐' : '☆'}
                        </span>
                        <div class="memo-info">
                            <div class="memo-title">${escapeHtml(memo.title)}</div>
                            <div class="memo-preview">${escapeHtml(preview)}</div>

        async function createNewMemo() {
            try {
                // 'root'는 미분류 폴더를 의미하므로 API에는 null로 전달

        // 메모 열기
        async function openMemo(memoId) {
            try {
                const response = await fetch(`/api/memos/${memoId}`);

                const memo = await response.json();
                currentMemoId = memoId;

                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('memoEditor').style.display = 'flex';

                renderMemos();

                showToast('메모를 열 수 없습니다', 'error');
            }

        // 에디터 닫기
        function closeEditor() {
            if (isEditing && currentMemoId) {
                saveMemo(true);  // 자동 저장
            }

            isEditing = false;
            currentMemoId = null;
            document.getElementById('memoEditor').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            loadMemos();

        // 메모 저장
        async function saveMemo(silent = false) {
            if (!currentMemoId) return;

            const title = document.getElementById('editorTitle').value.trim();
            const content = document.getElementById('editorContent').value;

            // 민감정보 검사 - 감지되면 저장 차단
            const fullText = title + '\n' + content;
            const sensitiveCheck = checkSensitiveInfo(fullText);
            if (sensitiveCheck.hasSensitive) {
                if (!silent) showToast('민감정보가 포함되어 저장할 수 없습니다', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/memos/${currentMemoId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                if (response.ok) {
                    if (!silent) showToast('저장되었습니다', 'success');
                    document.getElementById('editorMeta').textContent = `수정: 방금 전`;
                } else {
                    const error = await response.json();
                    showToast(error.error || '저장 실패', 'error');
                }
            } catch (error) {
                if (!silent) showToast('저장 실패', 'error');
            }
        }

        // 자동 저장
        function autoSave() {
            if (isEditing && currentMemoId) {
                // 민감정보가 있으면 자동 저장 안 함
                const title = document.getElementById('editorTitle').value.trim();
                const content = document.getElementById('editorContent').value;
                const sensitiveCheck = checkSensitiveInfo(title + '\n' + content);
                if (!sensitiveCheck.hasSensitive) {
                    saveMemo(true);
                }
            }
        }

        // 부모 폴더 선택 드롭다운 업데이트
        function updateParentFolderSelect(excludeFolderId = null) {
            const select = document.getElementById('parentFolderSelect');
            let html = '<option value="">루트 (최상위)</option>';

            folders.forEach(folder => {
                // 자기 자신과 자신의 하위 폴더는 제외
                if (excludeFolderId && (folder.id === excludeFolderId || isDescendantOf(folder.id, excludeFolderId))) {
                    return;
                }
                const indent = '　'.repeat(folder.depth);  // 전각 공백으로 들여쓰기
                html += `<option value="${folder.id}">${indent}${escapeHtml(folder.name)}</option>`;
            });

            select.innerHTML = html;
        }

        // 특정 폴더가 다른 폴더의 하위인지 확인
        function isDescendantOf(folderId, ancestorId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return false;
            if (folder.parent_id === ancestorId) return true;
            if (folder.parent_id) return isDescendantOf(folder.parent_id, ancestorId);
            return false;
        }

        // 컨텍스트 메뉴
        function showContextMenu(event, type, id) {
            event.preventDefault();
            event.stopPropagation();

            contextTarget = id;
            contextType = type;

            const menu = document.getElementById('contextMenu');

            // 폴더 전용 메뉴 아이템 표시/숨김

        async function contextAction(action) {
            document.getElementById('contextMenu').classList.remove('show');

            if (contextType === 'folder') {
                if (action === 'rename') {
                    const folder = folders.find(f => f.id === contextTarget);
                    editingFolderId = contextTarget;
                    document.getElementById('folderModalTitle').textContent = '✏️ 폴더 이름 변경';
                    document.getElementById('folderNameInput').value = folder?.name || '';
                    // 이름 변경 시 부모 폴더 선택 숨김
                    document.getElementById('parentFolderSection').style.display = 'none';
                    document.getElementById('folderModal').classList.add('show');
                    document.getElementById('folderNameInput').focus();
                } else if (action === 'addChild') {
                    // 하위 폴더 추가
                    showNewFolderModal(contextTarget);
                } else if (action === 'move') {
                    showMoveFolderModal(contextTarget);
                } else if (action === 'delete') {
                    if (confirm('이 폴더와 하위 항목을 모두 삭제하시겠습니까?')) {
                        try {
                            const response = await fetch(`/api/memos/folders/${contextTarget}`, { method: 'DELETE' });
                            if (response.ok) {
                                if (currentFolderId === contextTarget) selectFolder(null);
                                loadFolders();
                                showToast('폴더가 삭제되었습니다', 'success');
                            }
                        } catch (error) {
                            showToast('삭제 실패', 'error');
                        }
                    }
                }
            } else if (contextType === 'memo') {
                if (action === 'move') {
                    currentMemoId = contextTarget;
                    showMoveMemoModal();
                } else if (action === 'delete') {
                    if (confirm('이 메모를 삭제하시겠습니까?')) {
                        try {
                            const response = await fetch(`/api/memos/${contextTarget}`, { method: 'DELETE' });
                            if (response.ok) {
                                loadMemos();
                                showToast('삭제되었습니다', 'success');
                            }
                        } catch (error) {
                            showToast('삭제 실패', 'error');
                        }
                    }
                }
            }
        }

        // 폴더/메모 이동 모달
        // 'root'는 루트 선택, null은 미선택 상태

            selectedMoveFolder = 'root';  // 기본값: 루트 선택

        function renderFolderSelectList(type) {
            const list = document.getElementById('folderSelectList');
            // "루트 (폴더 없음)"은 메모가 어떤 폴더에도 속하지 않는 상태
            let html = `
                <div class="folder-select-item ${selectedMoveFolder === 'root' ? 'selected' : ''}"
                     onclick="selectMoveFolder('root')"
                     style="touch-action: manipulation;">
                    <span>📂</span> <span>폴더 없음 (루트)</span>
                </div>
            `;

            folders.forEach(folder => {
                // 폴더 이동 시: 자기 자신 및 자기 하위 폴더 제외
                if (type === 'folder') {
                    if (folder.id === contextTarget) return;
                    if (isDescendantOf(folder.id, contextTarget)) return;
                }

                const indent = '　'.repeat(folder.depth);  // 전각 공백으로 들여쓰기
                html += `
                    <div class="folder-select-item ${selectedMoveFolder === folder.id ? 'selected' : ''}"
                         onclick="selectMoveFolder(${folder.id})"
                         style="touch-action: manipulation;">
                        <span>${indent}📁</span> <span>${escapeHtml(folder.name)}</span>
                    </div>
                `;
            });

            list.innerHTML = html;

        // ==================== 드래그 앤 드롭 ====================
        let draggingMemoId = null;

        // 메모 드래그 시작
        function handleMemoDragStart(event, memoId) {
            draggingMemoId = memoId;
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', memoId);

            // 드래그 이미지 설정 (선택사항)
            const memo = memos.find(m => m.id === memoId);
            if (memo) {
                const dragImage = document.createElement('div');
                dragImage.textContent = memo.title || '메모';
                dragImage.style.cssText = 'position: absolute; top: -1000px; padding: 8px 16px; background: #667eea; color: white; border-radius: 6px; font-size: 14px;';
                document.body.appendChild(dragImage);
                event.dataTransfer.setDragImage(dragImage, 0, 0);
                setTimeout(() => dragImage.remove(), 0);
            }
        }

        // 메모 드래그 종료
        function handleMemoDragEnd(event) {
            draggingMemoId = null;
            event.target.classList.remove('dragging');

            // 모든 폴더에서 drag-over 클래스 제거
            document.querySelectorAll('.folder-item.drag-over').forEach(el => {
                el.classList.remove('drag-over');
            });
        }

        // 폴더 위로 드래그 중
        function handleFolderDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';

            const folderItem = event.target.closest('.folder-item');
            if (folderItem && draggingMemoId) {
                folderItem.classList.add('drag-over');
            }
        }

        // 폴더에서 드래그 벗어남
        function handleFolderDragLeave(event) {
            const folderItem = event.target.closest('.folder-item');
            if (folderItem) {
                // 자식 요소로 이동한 경우 무시
                const relatedTarget = event.relatedTarget;
                if (relatedTarget && folderItem.contains(relatedTarget)) {
                    return;
                }
                folderItem.classList.remove('drag-over');
            }
        }

        // 폴더에 드롭
        async function handleFolderDrop(event, folderId) {
            event.preventDefault();

            const folderItem = event.target.closest('.folder-item');
            if (folderItem) {
                folderItem.classList.remove('drag-over');
            }

            if (!draggingMemoId) return;

            // 'root'를 null로 변환 (API에서는 null이 루트)
            const targetFolderId = folderId === 'root' ? null : folderId;
            const memoId = draggingMemoId;
            draggingMemoId = null;

            // 현재 폴더로 이동하려는 경우 무시
            const memo = memos.find(m => m.id === memoId);
            if (memo && memo.folder_id === targetFolderId) {
                return;
            }

            try {
                const response = await fetch(`/api/memos/${memoId}/move`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder_id: targetFolderId })
                });

                if (response.ok) {
                    const folderName = folderId === 'root'
                        ? '루트'
                        : folders.find(f => f.id === folderId)?.name || '폴더';
                    showToast(`📁 "${folderName}"(으)로 이동됨`, 'success');
                    loadMemos();
                    loadFolders();
                } else {
                    const error = await response.json();
                    showToast(error.error || '이동 실패', 'error');
                }
            } catch (error) {
                console.error('드래그 앤 드롭 이동 오류:', error);
                showToast('이동 실패', 'error');
            }
        }

        // 유틸리티
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '방금 전';
            if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '시간 전';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '일 전';

            return date.toLocaleDateString('ko-KR');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== 튜토리얼 ====================
        let memosTutorial = null;

        function initMemosTutorial() {
            // 이미 완료된 경우 건너뛰기
            if (localStorage.getItem('crm_onboarding_memos') === 'true') {
                return;
            }

            // onboarding.js 로드 확인
            if (typeof CRMOnboarding === 'undefined') {
                const script = document.createElement('script');
                script.src = '/static/js/onboarding.js';
                script.onload = startMemosTutorial;
                document.head.appendChild(script);
            } else {
                startMemosTutorial();
            }
        }

        function startMemosTutorial() {
            memosTutorial = new CRMOnboarding({
                storageKey: 'crm_onboarding_memos',
                steps: [
                    {
                        target: '.sidebar',
                        title: '📁 폴더 사이드바',
                        description: '폴더로 메모를 체계적으로 정리하세요.<br><strong>전체 메모</strong>: 모든 메모<br><strong>⭐ 즐겨찾기</strong>: 중요 메모<br><strong>루트</strong>: 미분류 메모',
                        position: 'right'
                    },
                    {
                        target: '.content-header',
                        title: '✏️ 새 메모 작성',
                        description: '<strong>새 메모</strong> 버튼을 클릭하여 메모를 작성하세요. 3초마다 자동 저장됩니다.',
                        position: 'bottom'
                    },
                    {
                        target: '.search-box',
                        title: '🔍 메모 검색',
                        description: '제목이나 내용으로 메모를 빠르게 검색할 수 있습니다.',
                        position: 'bottom'
                    },
                    {
                        target: '.privacy-notice',
                        title: '🔒 개인정보 보호',
                        description: '전화번호, 생년월일은 저장 불가.<br><strong>CU.</strong>(고객), <strong>CO.</strong>(상담), <strong>RP</strong>(품목)는 허용됩니다.',
                        position: 'bottom'
                    }
                ],
                onComplete: function() {
                    showToast('메모 사용법을 익혔습니다! 🎉', 'success');
                }
            });

            // 튜토리얼 시작
            memosTutorial.start();
        }

        // 페이지 로드 완료 후 튜토리얼 시작
        document.addEventListener('DOMContentLoaded', function() {
            // 폴더 및 메모 로드 완료 후 튜토리얼 시작 (1.5초 대기)
            setTimeout(initMemosTutorial, 1500);
        });
    </script>
