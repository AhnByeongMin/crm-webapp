<div class="header">
    <h1>
        {{ page_title }}
        {% if is_admin %}
        <span class="admin-badge">관리자</span>
        {% endif %}
    </h1>

    <!-- 헤더 설정 버튼 (다크모드, 폰트 크기) -->
    <div class="header-settings">
        <!-- 다크모드 토글 -->
        <button class="header-dark-toggle" id="headerDarkToggle" onclick="headerToggleDarkMode()" title="다크모드 전환">
            <span class="icon" id="darkModeIcon">☀️</span>
            <span class="label" id="darkModeLabel">라이트</span>
        </button>

        <!-- 폰트 크기 조절 -->
        <div class="header-font-controls" title="글자 크기 조절">
            <button class="header-font-btn" data-size="small" onclick="headerSetFontSize('small')">가</button>
            <button class="header-font-btn active" data-size="medium" onclick="headerSetFontSize('medium')">가</button>
            <button class="header-font-btn" data-size="large" onclick="headerSetFontSize('large')">가</button>
        </div>

        <!-- 테마 설정 버튼 -->
        <button class="header-theme-btn" id="headerThemeBtn" onclick="ThemeCustomizer.show()" title="테마 색상 변경">
            <span class="icon">🎨</span>
            <span class="label">테마</span>
        </button>

        <!-- 튜토리얼 버튼 -->
        <button class="header-tutorial-btn" id="headerTutorialBtn" onclick="restartTutorial()" title="사용법 튜토리얼 다시 보기">
            <span class="icon">📖</span>
            <span class="label">가이드</span>
        </button>
    </div>

    <button class="nav-toggle" id="navToggle" onclick="toggleMobileNav()" aria-label="메뉴 열기">☰</button>
    <div class="nav" id="mainNav">
        {% if is_admin %}
        <a href="/admin" {% if current_page == 'admin' %}class="active"{% endif %}>할일관리</a>
        <a href="/users" {% if current_page == 'users' %}class="active"{% endif %}>사용자관리</a>
        {% else %}
        <a href="/" id="navTasks" {% if current_page == 'tasks' %}class="active"{% endif %}>
            할일
            <span id="navTasksBadge" class="nav-badge" style="display: none;"></span>
        </a>
        {% endif %}
        <a href="/promotions" {% if current_page == 'promotions' %}class="active"{% endif %}>프로모션</a>
        <a href="/chats" id="navChats" {% if current_page == 'chats' or current_page == 'chat_room' %}class="active"{% endif %}>
            채팅
            <span id="navChatsBadge" class="nav-badge" style="display: none;"></span>
        </a>
        <a href="/reminders" id="navReminders" {% if current_page == 'reminders' %}class="active"{% endif %}>
            내 예약
            <span id="navRemindersBadge" class="nav-badge" style="display: none;"></span>
        </a>
        <a href="/mypage" {% if current_page == 'mypage' %}class="active"{% endif %}>마이페이지</a>
        <a href="/logout" class="secondary">로그아웃</a>
    </div>
</div>

<script>
// 모바일 네비게이션 토글
function toggleMobileNav() {
    const nav = document.getElementById('mainNav');
    const toggle = document.getElementById('navToggle');
    nav.classList.toggle('active');
    toggle.textContent = nav.classList.contains('active') ? '✕' : '☰';
    toggle.setAttribute('aria-label', nav.classList.contains('active') ? '메뉴 닫기' : '메뉴 열기');
}

// 모바일 메뉴 닫기 함수
function closeMobileNav() {
    const nav = document.getElementById('mainNav');
    const toggle = document.getElementById('navToggle');
    if (window.innerWidth <= 768) {
        nav.classList.remove('active');
        toggle.textContent = '☰';
        toggle.setAttribute('aria-label', '메뉴 열기');
    }
}

// 네비게이션 링크 및 버튼 클릭 시 메뉴 닫기
document.querySelectorAll('.nav a, .nav button').forEach(item => {
    item.addEventListener('click', closeMobileNav);
});

// 화면 밖 클릭 시 메뉴 닫기
document.addEventListener('click', (e) => {
    const nav = document.getElementById('mainNav');
    const toggle = document.getElementById('navToggle');
    const header = document.querySelector('.header');
    if (window.innerWidth <= 768 && !header.contains(e.target)) {
        nav.classList.remove('active');
        toggle.textContent = '☰';
    }
});

// 헤더 다크모드 토글
function headerToggleDarkMode() {
    const DARK_MODE_KEY = 'crm_dark_mode';
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem(DARK_MODE_KEY, 'false');
    } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem(DARK_MODE_KEY, 'true');
    }

    updateHeaderDarkModeUI();

    // 마이페이지의 토글도 업데이트 (있으면)
    if (typeof updateDarkModeToggle === 'function') {
        updateDarkModeToggle();
    }
}

// 헤더 다크모드 UI 업데이트
function updateHeaderDarkModeUI() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const icon = document.getElementById('darkModeIcon');
    const label = document.getElementById('darkModeLabel');

    if (icon) {
        icon.textContent = isDark ? '🌙' : '☀️';
    }
    if (label) {
        label.textContent = isDark ? '다크' : '라이트';
    }
}

// 헤더 폰트 크기 설정 (zoom 방식으로 전체 확대/축소)
function headerSetFontSize(size) {
    const FONT_SIZE_KEY = 'crm_font_size';
    const zoomLevels = {
        small: 0.9,    // 90%
        medium: 1.0,   // 100%
        large: 1.15    // 115%
    };

    const zoom = zoomLevels[size] || 1.0;

    // 다양한 메인 컨테이너 셀렉터
    const containerSelectors = [
        '.container',
        '.chat-container',
        '.page-content',
        '.page-container',
        'main',
        '.content'
    ];

    let applied = false;
    for (const selector of containerSelectors) {
        const el = document.querySelector(selector);
        if (el) {
            el.style.zoom = zoom;
            applied = true;
            break;
        }
    }

    // fallback: body에 적용하되 헤더는 리셋
    if (!applied && document.body) {
        document.body.style.zoom = zoom;
        const header = document.querySelector('.header');
        if (header) header.style.zoom = 1 / zoom;
    }

    localStorage.setItem(FONT_SIZE_KEY, size);
    updateHeaderFontSizeUI(size);
}

// 헤더 폰트 크기 UI 업데이트
function updateHeaderFontSizeUI(activeSize) {
    const buttons = document.querySelectorAll('.header-font-btn');
    buttons.forEach(btn => {
        if (btn.dataset.size === activeSize) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

// 페이지 로드 시 헤더 설정 UI 초기화
document.addEventListener('DOMContentLoaded', () => {
    // 다크모드 UI 초기화
    updateHeaderDarkModeUI();

    // 폰트 크기 UI 초기화
    const savedSize = localStorage.getItem('crm_font_size') || 'medium';
    updateHeaderFontSizeUI(savedSize);
});

// 튜토리얼 재시작 함수
function restartTutorial() {
    // 현재 페이지의 튜토리얼 키 찾기
    const pageKeys = {
        '/admin': 'crm_onboarding_admin',
        '/': 'crm_onboarding_user',
        '/users': 'crm_onboarding_users',
        '/reminders': 'crm_onboarding_reminders',
        '/promotions': 'crm_onboarding_promotions',
        '/chats': 'crm_onboarding_chat_list'
    };

    const path = window.location.pathname;
    let storageKey = null;

    // 정확한 경로 매칭
    if (pageKeys[path]) {
        storageKey = pageKeys[path];
    }

    if (storageKey) {
        // 완료 상태 리셋
        localStorage.removeItem(storageKey);

        // 페이지 새로고침하여 튜토리얼 시작
        location.reload();
    } else {
        // 튜토리얼이 없는 페이지
        if (window.toast) {
            toast.info('이 페이지에는 튜토리얼이 없습니다.');
        } else {
            alert('이 페이지에는 튜토리얼이 없습니다.');
        }
    }
}
</script>

<!-- 배지 업데이트 스크립트 -->
<script>
    // 네비게이션 배지 업데이트
    function updateNavBadges(counts) {
        const tasksBadge = document.getElementById('navTasksBadge');
        const chatsBadge = document.getElementById('navChatsBadge');
        const remindersBadge = document.getElementById('navRemindersBadge');

        if (tasksBadge) {
            if (counts.pending_tasks > 0) {
                tasksBadge.textContent = counts.pending_tasks;
                tasksBadge.style.display = 'inline-block';
            } else {
                tasksBadge.style.display = 'none';
            }
        }

        if (chatsBadge) {
            if (counts.unread_chats > 0) {
                chatsBadge.textContent = counts.unread_chats;
                chatsBadge.style.display = 'inline-block';
            } else {
                chatsBadge.style.display = 'none';
            }
        }

        if (remindersBadge) {
            if (counts.today_reminders > 0) {
                remindersBadge.textContent = counts.today_reminders;
                remindersBadge.style.display = 'inline-block';
            } else {
                remindersBadge.style.display = 'none';
            }
        }
    }

    // 네비게이션 카운트 조회 (캐시 활용)
    let lastNavFetch = 0;
    const NAV_FETCH_COOLDOWN = 5000; // 5초 쿨다운

    function fetchNavCounts() {
        const now = Date.now();
        if (now - lastNavFetch < NAV_FETCH_COOLDOWN) return;
        lastNavFetch = now;

        fetch('/api/nav-counts')
            .then(res => res.json())
            .then(counts => {
                updateNavBadges(counts);
            })
            .catch(err => console.error('Failed to fetch nav counts:', err));
    }

    // Socket.IO 실시간 업데이트
    let socketConnected = false;
    if (typeof io !== 'undefined') {
        const socket = io();

        // 사용자 room 입장
        socket.emit('join_user_room', { username: '{{ username }}' });

        // 실시간 배지 업데이트 수신
        socket.on('nav_counts_update', (counts) => {
            updateNavBadges(counts);
        });

        socket.on('connect', () => { socketConnected = true; });
        socket.on('disconnect', () => { socketConnected = false; });
    }

    // 페이지 로드 시 초기 조회 + 페이지 포커스 시에만 갱신 (폴링 제거)
    document.addEventListener('DOMContentLoaded', () => {
        fetchNavCounts();
    });

    // 페이지가 다시 보일 때만 갱신 (탭 전환, 앱 복귀 시)
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && !socketConnected) {
            fetchNavCounts();
        }
    });
</script>
