<!-- 플로팅 버튼 공통 스타일 (도움말, 당일예약 버튼) -->

<style>
/* 당일 예약 모달 */
.today-reminders-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);

    justify-content: center;
}
.today-reminders-modal.active {
    display: flex;
}
.today-reminders-modal-content {
    background: white;
    border-radius: 12px;
    padding: 0;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    animation: slideUpModal 0.3s ease-out;
    display: flex;

}
@keyframes slideUpModal {
    from {

        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);

}
.today-reminders-modal-header {

    justify-content: space-between;
    align-items: center;

.today-reminders-modal-header-left {

}
.quick-add-btn {

    color: #ff6b6b;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.quick-add-btn:hover {

    transform: scale(1.05);
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);

.today-reminders-modal-title {

.today-reminders-modal-close {

.today-reminders-modal-body {

    overflow-y: auto;
    flex: 1;

}
.reminder-item {

}
.reminder-item:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);

}
.reminder-item.urgent {
    border-left-color: #dc3545;
    background: #fff5f5;
}
.reminder-item.warning {
    border-left-color: #ff9800;

}
.reminder-item.overdue {
    border-left-color: #6c757d;
    background: #f8f9fa;
}
.reminder-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
}
.reminder-time {
    font-size: 18px;
    font-weight: bold;
    color: #333;
}
.reminder-time.urgent {
    color: #dc3545;
}
.reminder-time.warning {
    color: #ff9800;
}
.reminder-time.overdue {
    color: #6c757d;
}
.reminder-urgency {
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
}
.reminder-urgency.urgent {
    background: #dc3545;
    color: white;
}
.reminder-urgency.warning {
    background: #ff9800;
    color: white;
}
.reminder-urgency.overdue {
    background: #6c757d;
    color: white;
}
.reminder-title {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
}
.reminder-content {
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
    line-height: 1.5;
}
.reminder-actions {
    display: flex;
    gap: 8px;
}
.btn-complete {
    padding: 6px 16px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
}
.btn-complete:hover {
    background: #218838;
}
.btn-view {
    padding: 6px 16px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
}
.btn-view:hover {
    background: #5568d3;
}
.no-reminders {
    text-align: center;
    padding: 40px 20px;
    color: #6c757d;
    font-size: 16px;

/* 다크모드 */

}

[data-theme="dark"] .today-reminders-modal-header {

}

[data-theme="dark"] .today-reminders-modal-body {

}

[data-theme="dark"] .reminder-item {

    border-color: #404040;
}

[data-theme="dark"] .reminder-item:hover {

}

[data-theme="dark"] .reminder-item.urgent {

    border-left-color: #e74c3c;
}

[data-theme="dark"] .reminder-item.warning {

}

}

[data-theme="dark"] .reminder-time.urgent {

}

[data-theme="dark"] .reminder-time.warning {
    color: #f39c12;
}

[data-theme="dark"] .reminder-time.overdue {

}

[data-theme="dark"] .reminder-title {

[data-theme="dark"] .reminder-content {

[data-theme="dark"] .no-reminders {

}

[data-theme="dark"] .quick-add-btn:hover {

}

[data-theme="dark"] .btn-complete {

}

[data-theme="dark"] .btn-complete:hover {

</style>

<!-- 당일 예약 버튼 -->
<button class="today-reminders-button" id="todayRemindersButton" onclick="openTodayRemindersModal()" title="당일 예약 확인">
    📅
    <span class="reminder-badge" id="reminderBadge">0</span>
</button>

<!-- 당일 예약 모달 -->
<div class="today-reminders-modal" id="todayRemindersModal">
    <div class="today-reminders-modal-content">
        <div class="today-reminders-modal-header">
            <div class="today-reminders-modal-header-left">
                <div class="today-reminders-modal-title">
                    📅 오늘의 예약
                </div>
                <button class="quick-add-btn" onclick="quickAddTodayReminder()">
                    <span>➕</span>
                    <span>빠른 예약</span>
                </button>
            </div>
            <button class="today-reminders-modal-close" onclick="closeTodayRemindersModal()">&times;</button>
        </div>
        <div class="today-reminders-modal-body" id="todayRemindersBody">
            <div class="no-reminders">로딩 중...</div>
        </div>
    </div>
</div>

<script>
// 당일 예약 모달 제어
function openTodayRemindersModal() {
    document.getElementById('todayRemindersModal').classList.add('active');
    document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
    loadTodayReminders();
}

function closeTodayRemindersModal() {
    document.getElementById('todayRemindersModal').classList.remove('active');
    document.body.style.overflow = ''; // 배경 스크롤 복원
}

// 빠른 예약 추가 (기본값: 오늘)
function quickAddTodayReminder() {
    // 오늘 날짜를 기본값으로 설정
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

    // 전역 openAddModal 함수 호출 (이제 reminder_modal.html에 포함됨)
    openAddModal(todayStr);

    // 모달 닫기
    closeTodayRemindersModal();
}

// 모달 외부 클릭 시 닫기 및 초기 로드
(function() {
    const modal = document.getElementById('todayRemindersModal');
    if (modal) {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeTodayRemindersModal();
            }
        });
    }

    // 초기 로드 (즉시 실행)
    checkTodayReminders();
})();

// 전역 예약 카운트 데이터 (모든 배지에서 공유)
window.reminderCounts = { today_count: 0, overdue_count: 0 };

// 당일 예약 확인 (모든 배지 업데이트) - 항상 서버 조회
async function checkTodayReminders() {
    try {
        // 서버에서 최신 데이터 조회 (캐싱 없이 항상 최신값)
        const response = await fetch('/api/reminders/banner-check');
        const data = await response.json();

        // 전역 변수에 저장 (다른 곳에서 재사용)
        window.reminderCounts = {
            today_count: data.today_count || 0,
            overdue_count: data.overdue_count || 0
        };

        // 모든 배지 업데이트
        updateAllReminderBadges();
    } catch (error) {
        console.error('예약 확인 실패:', error);
    }
}

// 예약 변경 시 즉시 갱신 (완료, 추가, 수정 후 호출)
function refreshReminderBadge() {
    checkTodayReminders();
}

// 모든 예약 관련 배지 업데이트
function updateAllReminderBadges() {
    const todayCount = window.reminderCounts.today_count;
    const overdueCount = window.reminderCounts.overdue_count;

    // 1. 퀵버튼 배지 (당일만)
    const quickBadge = document.getElementById('reminderBadge');
    if (quickBadge) {
        if (todayCount > 0) {
            quickBadge.style.display = 'flex';
            quickBadge.textContent = todayCount;
        } else {
            quickBadge.style.display = 'none';
        }
    }

    // 2. 헤더 메뉴 배지 (당일만)
    const headerBadge = document.getElementById('navRemindersBadge');
    if (headerBadge) {
        if (todayCount > 0) {
            headerBadge.textContent = todayCount;
            headerBadge.style.display = 'inline-block';
        } else {
            headerBadge.style.display = 'none';
        }
    }

    // 3. 내 예약 페이지 배너 (있는 경우만)
    updateReminderPageBanners(todayCount, overdueCount);
}

// 내 예약 페이지 배너 업데이트 (해당 페이지에서만 작동)
function updateReminderPageBanners(todayCount, overdueCount) {
    const container = document.getElementById('alertBanners');
    if (!container) return; // 내 예약 페이지가 아니면 무시

    let html = '';
    if (todayCount > 0) {
        html += `<div class="alert-banner danger">
            <strong>🔴 오늘 예약 ${todayCount}건</strong>이 있습니다!
        </div>`;
    }
    if (overdueCount > 0) {
        html += `<div class="alert-banner warning">
            <strong>⚠️ 지난 예약 ${overdueCount}건</strong>이 미완료 상태입니다.
        </div>`;
    }
    container.innerHTML = html;
}

// 당일 예약 목록 로드
async function loadTodayReminders() {
    try {
        const response = await fetch('/api/reminders/today');
        const reminders = await response.json();

        const body = document.getElementById('todayRemindersBody');

        if (reminders.length === 0) {
            body.innerHTML = '<div class="no-reminders">오늘 예약이 없습니다</div>';
            return;
        }

        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();

        body.innerHTML = reminders.map(reminder => {
            const [hours, minutes] = reminder.scheduled_time.split(':').map(Number);
            const reminderTime = hours * 60 + minutes;
            const diffMinutes = reminderTime - currentTime;

            let urgencyClass = '';
            let urgencyLabel = '';

            if (diffMinutes < 0) {
                urgencyClass = 'overdue';
                urgencyLabel = '지남';
            } else if (diffMinutes <= 60) {
                urgencyClass = 'urgent';
                urgencyLabel = '긴급';
            } else if (diffMinutes <= 120) {
                urgencyClass = 'warning';
                urgencyLabel = '주의';
            }

            return `
                <div class="reminder-item ${urgencyClass}">
                    <div class="reminder-header">
                        <div class="reminder-time ${urgencyClass}">${reminder.scheduled_time}</div>
                        ${urgencyLabel ? `<span class="reminder-urgency ${urgencyClass}">${urgencyLabel}</span>` : ''}
                    </div>
                    <div class="reminder-title">${escapeHtml(reminder.title)}</div>
                    <div class="reminder-content">${escapeHtml(reminder.content || '')}</div>
                    <div class="reminder-actions">
                        <button class="btn-complete" onclick="completeReminder(${reminder.id})">완료</button>
                        <a href="/reminders" class="btn-view">상세보기</a>
                    </div>
                </div>
            `;
        }).join('');
    } catch (error) {
        console.error('예약 로드 실패:', error);
        document.getElementById('todayRemindersBody').innerHTML =
            '<div class="no-reminders">예약 로드 실패</div>';
    }
}

// 예약 완료 처리
async function completeReminder(reminderId) {
    try {
        const response = await fetch(`/api/reminders/${reminderId}/complete`, {
            method: 'PATCH'
        });

        if (response.ok) {
            // 목록 새로고침 + 배지 즉시 갱신 (캐시 무효화)
            loadTodayReminders();
            refreshReminderBadge();
        }
    } catch (error) {
        console.error('예약 완료 처리 실패:', error);
    }
}

// HTML 이스케이프
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Socket.IO 이벤트 리스너 (배지 업데이트 - 다른 탭/기기에서 변경 시)
if (typeof socket !== 'undefined') {
    socket.on('nav_counts_update', (counts) => {
        // 서버에서 변경 알림 받으면 캐시 무효화 후 즉시 갱신
        refreshReminderBadge();
    });
}
</script>
